name: Compile EA and Deploy to VPS

on:
  workflow_dispatch:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
      - '.github/workflows/compile-and-deploy.yml'
      - 'trigger-deploy.txt'

permissions:
  contents: write

jobs:
  compile-and-deploy:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Disable Windows Defender (prevents blocking MT5 installer)
        shell: powershell
        run: |
          Write-Host "=== Disabling Windows Defender real-time protection ==="
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "C:\" -ErrorAction SilentlyContinue
          Write-Host "Defender disabled for CI"

      - name: Download MetaTrader 5
        shell: powershell
        run: |
          Write-Host "=== Runner Info ==="
          Write-Host "OS: $([System.Environment]::OSVersion)"
          Write-Host "User: $env:USERNAME"
          Write-Host "Temp: $env:TEMP"

          Write-Host "=== Downloading MT5 ==="
          $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"

          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Write-Host "Download attempt $i..."
              Invoke-WebRequest -Uri $url -OutFile "mt5setup.exe" -UseBasicParsing -TimeoutSec 120
              $fileSize = (Get-Item mt5setup.exe).Length
              Write-Host "Downloaded: $fileSize bytes"
              if ($fileSize -gt 1000000) {
                Write-Host "Download OK"
                break
              }
              Write-Host "File too small, retrying..."
            } catch {
              Write-Host "Download failed: $_"
              if ($i -lt $maxRetries) { Start-Sleep -Seconds 5 }
            }
          }

          if (-not (Test-Path "mt5setup.exe") -or (Get-Item "mt5setup.exe").Length -lt 1000000) {
            Write-Host "FATAL: MT5 download failed after $maxRetries attempts"
            exit 1
          }

      - name: Install MetaTrader 5
        shell: powershell
        run: |
          Write-Host "=== Installing MT5 silently ==="
          $proc = Start-Process -FilePath "mt5setup.exe" -ArgumentList "/auto" -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"

          Write-Host "=== Waiting for installation to complete ==="
          Start-Sleep -Seconds 60

          Write-Host "=== Searching for MetaEditor ==="
          # Search common locations
          $searchPaths = @(
            "C:\Program Files",
            "$env:APPDATA\MetaQuotes",
            "$env:APPDATA",
            "$env:LOCALAPPDATA",
            "C:\Users\$env:USERNAME",
            "C:\"
          )

          $metaeditor = $null
          foreach ($searchPath in $searchPaths) {
            if (-not (Test-Path $searchPath)) { continue }
            Write-Host "Searching: $searchPath"
            $found = Get-ChildItem -Path $searchPath -Filter "metaeditor64.exe" -Recurse -ErrorAction SilentlyContinue -Depth 6 | Select-Object -First 1
            if ($found) {
              $metaeditor = $found
              Write-Host "FOUND: $($found.FullName)"
              break
            }
          }

          if ($metaeditor) {
            $mt5dir = $metaeditor.DirectoryName
            Write-Host "MetaEditor: $($metaeditor.FullName)"
            Write-Host "MT5 Dir: $mt5dir"
            echo "MT5_DIR=$mt5dir" >> $env:GITHUB_ENV
            echo "METAEDITOR=$($metaeditor.FullName)" >> $env:GITHUB_ENV
          } else {
            Write-Host "ERROR: MetaEditor not found after installation!"
            Write-Host ""
            Write-Host "=== Diagnostic: Program Files ==="
            Get-ChildItem -Path "C:\Program Files" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            Write-Host "=== Diagnostic: AppData ==="
            Get-ChildItem -Path "$env:APPDATA" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            Write-Host "=== Diagnostic: Processes ==="
            Get-Process | Where-Object { $_.ProcessName -like "*meta*" -or $_.ProcessName -like "*mt5*" } | Format-Table
            Write-Host "=== Diagnostic: Recent exe files ==="
            Get-ChildItem -Path "C:\Program Files" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue -Depth 4 | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Copy EA files and compile
        shell: powershell
        run: |
          $mt5dir = $env:MT5_DIR
          $metaeditor = $env:METAEDITOR

          Write-Host "=== MT5 dir: $mt5dir ==="
          Write-Host "=== MetaEditor: $metaeditor ==="

          # Check MQL5 standard library exists
          $includePath = Join-Path $mt5dir "MQL5\Include"
          Write-Host "=== MQL5 Include dir ==="
          if (Test-Path $includePath) {
            Write-Host "Include dir exists"
            $tradeFile = Join-Path $includePath "Trade\Trade.mqh"
            if (Test-Path $tradeFile) {
              Write-Host "Trade.mqh found: $tradeFile"
            } else {
              Write-Host "WARNING: Trade.mqh NOT found at $tradeFile"
              Write-Host "Contents of Include:"
              Get-ChildItem $includePath -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
            }
          } else {
            Write-Host "WARNING: MQL5 Include directory not found!"
          }

          # Create PropFirmBot directory
          $eaDir = Join-Path $mt5dir "MQL5\Experts\PropFirmBot"
          New-Item -ItemType Directory -Force -Path $eaDir | Out-Null

          # Copy EA files
          Write-Host "=== Copying EA files ==="
          Copy-Item "EA\*" -Destination $eaDir -Force -Verbose

          # Copy configs
          $filesDir = Join-Path $mt5dir "MQL5\Files\PropFirmBot"
          New-Item -ItemType Directory -Force -Path $filesDir | Out-Null
          Copy-Item "configs\*" -Destination $filesDir -Force -Verbose

          Write-Host "=== Files in EA dir ==="
          Get-ChildItem $eaDir | Format-Table Name, Length

          # Compile
          $mq5file = Join-Path $eaDir "PropFirmBot.mq5"
          Write-Host "=== Compiling: $mq5file ==="
          Write-Host "Command: $metaeditor /compile:$mq5file /log /include:$eaDir"

          $compileProc = Start-Process -FilePath $metaeditor -ArgumentList "/compile:`"$mq5file`" /log /include:`"$eaDir`"" -Wait -PassThru -NoNewWindow
          Write-Host "MetaEditor exit code: $($compileProc.ExitCode)"

          # Wait for file to be written
          Start-Sleep -Seconds 15

          # Always check for logs
          Write-Host "=== Compilation logs ==="
          $logFiles = Get-ChildItem -Path $eaDir -Filter "*.log" -ErrorAction SilentlyContinue
          if ($logFiles) {
            foreach ($logFile in $logFiles) {
              Write-Host "--- $($logFile.Name) ($($logFile.Length) bytes) ---"
              Get-Content $logFile.FullName -ErrorAction SilentlyContinue
            }
          } else {
            Write-Host "No log files in EA dir"
            # Check parent directories for logs
            $mql5LogDir = Join-Path $mt5dir "MQL5\Logs"
            if (Test-Path $mql5LogDir) {
              Write-Host "=== MQL5 Logs dir ==="
              Get-ChildItem $mql5LogDir -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "--- $($_.Name) ---"
                Get-Content $_.FullName -Tail 20 -ErrorAction SilentlyContinue
              }
            }
          }

          # Check result
          Write-Host "=== Checking compilation result ==="
          $ex5 = Get-ChildItem -Path $mt5dir -Filter "PropFirmBot.ex5" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ex5) {
            Write-Host "SUCCESS! Found: $($ex5.FullName) ($($ex5.Length) bytes)"
            Copy-Item $ex5.FullName -Destination "PropFirmBot.ex5" -Force
            echo "EX5_PATH=$($ex5.FullName)" >> $env:GITHUB_ENV
            echo "COMPILE_SUCCESS=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "ERROR: .ex5 not found after compilation!"
            Write-Host "=== All files in MT5 dir ==="
            Get-ChildItem -Path $mt5dir -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in @('.ex5', '.log', '.mq5') } | ForEach-Object {
              Write-Host "$($_.FullName) ($($_.Length) bytes)"
            }
            echo "COMPILE_SUCCESS=false" >> $env:GITHUB_ENV
            exit 1
          }

      - name: Upload compiled EA
        if: env.COMPILE_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PropFirmBot-EA
          path: PropFirmBot.ex5
          retention-days: 30

  deploy-to-vps:
    needs: compile-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download compiled EA
        uses: actions/download-artifact@v4
        with:
          name: PropFirmBot-EA

      - name: Deploy to VPS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          echo "=== Compiled EA ==="
          ls -la PropFirmBot.ex5

          echo "=== Uploading to VPS ==="
          EA_DIR="/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot"

          sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no PropFirmBot.ex5 "root@77.237.234.2:${EA_DIR}/PropFirmBot.ex5"

          # Also copy to root Experts dir
          sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no PropFirmBot.ex5 "root@77.237.234.2:/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot.ex5"

          echo "=== Deploy configs ==="
          FILES_DIR="/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Files/PropFirmBot"
          for f in configs/*; do
            sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no "$f" "root@77.237.234.2:${FILES_DIR}/$(basename $f)"
          done

          echo "=== Restart MT5 ==="
          sshpass -p 'Moti0417!' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 root@77.237.234.2 << 'REMOTE'
          export DISPLAY=:99
          export WINEPREFIX=/root/.wine
          export WINEDEBUG=-all
          export STAGING_WRITECOPY=1

          echo "Stopping MT5..."
          killall -9 terminal64.exe 2>/dev/null
          wineserver -k 2>/dev/null
          sleep 5

          echo "Checking .ex5..."
          ls -la "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot/PropFirmBot.ex5"

          echo "Starting MT5..."
          cd "/root/.wine/drive_c/Program Files/MetaTrader 5"
          wine terminal64.exe &
          sleep 15

          echo "MT5 status:"
          ps aux | grep terminal64 | grep -v grep

          echo "Checking EA loaded..."
          EALOG=$(ls -t "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Logs/"*.log 2>/dev/null | head -1)
          if [ -n "$EALOG" ]; then
            tail -10 "$EALOG" | tr -d '\0'
          fi
          REMOTE

          echo "=== Deploy complete ==="

      - name: Commit deploy report
        run: |
          echo "Deploy completed at $(date -u '+%Y-%m-%d %H:%M UTC')" > deploy_report.txt
          echo "EA file: PropFirmBot.ex5 ($(stat -c%s PropFirmBot.ex5 2>/dev/null || echo 'N/A') bytes)" >> deploy_report.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f deploy_report.txt
          git commit -m "Deploy report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin ${{ github.ref_name }} || true
