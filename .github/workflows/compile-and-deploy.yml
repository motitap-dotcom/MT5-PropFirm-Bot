name: Compile EA and Deploy to VPS

on:
  workflow_dispatch:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
      - '.github/workflows/compile-and-deploy.yml'
      - 'trigger-deploy.txt'

permissions:
  contents: write

jobs:
  compile:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Compile PropFirmBot EA
        uses: fx31337/mql-compile-action@master
        with:
          path: EA/PropFirmBot.mq5
          include: EA
          init-platform: true
          verbose: true

      - name: Find and verify compiled EA
        shell: powershell
        run: |
          Write-Host "=== Searching for compiled .ex5 ==="
          # Check in EA directory first
          if (Test-Path "EA/PropFirmBot.ex5") {
            $ex5 = Get-Item "EA/PropFirmBot.ex5"
            Write-Host "Found in EA dir: $($ex5.FullName) ($($ex5.Length) bytes)"
            Copy-Item $ex5.FullName -Destination "PropFirmBot.ex5" -Force
          } else {
            Write-Host "Not in EA dir, searching everywhere..."
            $ex5 = Get-ChildItem -Path . -Filter "PropFirmBot.ex5" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($ex5) {
              Write-Host "Found: $($ex5.FullName) ($($ex5.Length) bytes)"
              Copy-Item $ex5.FullName -Destination "PropFirmBot.ex5" -Force
            } else {
              # Also search MT5 installation dir
              $mt5ex5 = Get-ChildItem -Path "C:\" -Filter "PropFirmBot.ex5" -Recurse -ErrorAction SilentlyContinue -Depth 8 | Select-Object -First 1
              if ($mt5ex5) {
                Write-Host "Found in MT5: $($mt5ex5.FullName) ($($mt5ex5.Length) bytes)"
                Copy-Item $mt5ex5.FullName -Destination "PropFirmBot.ex5" -Force
              } else {
                Write-Host "ERROR: PropFirmBot.ex5 not found anywhere!"
                Write-Host "=== All .ex5 files ==="
                Get-ChildItem -Path . -Filter "*.ex5" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "$($_.FullName) ($($_.Length) bytes)" }
                Get-ChildItem -Path "C:\Program Files" -Filter "*.ex5" -Recurse -ErrorAction SilentlyContinue -Depth 6 | Select-Object -First 5 | ForEach-Object { Write-Host "$($_.FullName) ($($_.Length) bytes)" }
                exit 1
              }
            }
          }

          Write-Host "=== Final check ==="
          $final = Get-Item "PropFirmBot.ex5"
          Write-Host "PropFirmBot.ex5: $($final.Length) bytes"
          if ($final.Length -lt 1000) {
            Write-Host "ERROR: File too small (likely compilation failed)"
            exit 1
          }
          echo "COMPILE_SUCCESS=true" >> $env:GITHUB_ENV

      - name: Upload compiled EA
        if: env.COMPILE_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PropFirmBot-EA
          path: PropFirmBot.ex5
          retention-days: 30

  deploy-to-vps:
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download compiled EA
        uses: actions/download-artifact@v4
        with:
          name: PropFirmBot-EA

      - name: Deploy to VPS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          echo "=== Compiled EA ==="
          ls -la PropFirmBot.ex5

          echo "=== Uploading to VPS ==="
          EA_DIR="/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot"

          sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no PropFirmBot.ex5 "root@77.237.234.2:${EA_DIR}/PropFirmBot.ex5"

          # Also copy to root Experts dir
          sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no PropFirmBot.ex5 "root@77.237.234.2:/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot.ex5"

          echo "=== Deploy configs ==="
          FILES_DIR="/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Files/PropFirmBot"
          for f in configs/*; do
            sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no "$f" "root@77.237.234.2:${FILES_DIR}/$(basename $f)"
          done

          echo "=== Restart MT5 ==="
          sshpass -p 'Moti0417!' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 root@77.237.234.2 << 'REMOTE'
          export DISPLAY=:99
          export WINEPREFIX=/root/.wine
          export WINEDEBUG=-all
          export STAGING_WRITECOPY=1

          echo "Stopping MT5..."
          killall -9 terminal64.exe 2>/dev/null
          wineserver -k 2>/dev/null
          sleep 5

          echo "Checking .ex5..."
          ls -la "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot/PropFirmBot.ex5"

          echo "Starting MT5..."
          cd "/root/.wine/drive_c/Program Files/MetaTrader 5"
          wine terminal64.exe &
          sleep 15

          echo "MT5 status:"
          ps aux | grep terminal64 | grep -v grep

          echo "Checking EA loaded..."
          EALOG=$(ls -t "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Logs/"*.log 2>/dev/null | head -1)
          if [ -n "$EALOG" ]; then
            tail -10 "$EALOG" | tr -d '\0'
          fi
          REMOTE

          echo "=== Deploy complete ==="

      - name: Commit deploy report
        run: |
          echo "Deploy completed at $(date -u '+%Y-%m-%d %H:%M UTC')" > deploy_report.txt
          echo "EA file: PropFirmBot.ex5 ($(stat -c%s PropFirmBot.ex5 2>/dev/null || echo 'N/A') bytes)" >> deploy_report.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f deploy_report.txt
          git commit -m "Deploy report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin ${{ github.ref_name }} || true
