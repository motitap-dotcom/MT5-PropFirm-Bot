name: Bot Monitor

# Runs automatically during trading hours (ET):
# - 9:25 AM ET = market open check (gives bot 5 min to settle)
# - Every 30 min during session (10:00-15:30 ET)
# - 16:00 ET = end of day summary
on:
  schedule:
    - cron: '25 13 * * 1-5'   # 9:25 ET - pre-market check (Mon-Fri)
    - cron: '0 14-19 * * 1-5'  # Every hour 10:00-15:00 ET
    - cron: '30 14-19 * * 1-5' # Every :30 10:30-15:30 ET
    - cron: '0 20 * * 1-5'     # 16:00 ET - end of day
    - cron: '0 0 * * 1-5'      # 20:00 ET - overnight check
    - cron: '0 8 * * 1-5'      # 4:00 ET - early morning check
  workflow_dispatch:  # Manual trigger anytime

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and fix bot
        id: health
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no scripts/monitor_bot.sh ${VPS_USER}@${VPS_HOST}:/tmp/monitor_bot.sh
          RESULT=$(timeout 120 sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=10 ${VPS_USER}@${VPS_HOST} "bash /tmp/monitor_bot.sh 2>&1" || echo "VPS_UNREACHABLE")
          echo "$RESULT"

          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST}:/tmp/bot_monitor_result.txt /tmp/bot_monitor_result.txt 2>/dev/null || true
          if [ -f /tmp/bot_monitor_result.txt ]; then
            source /tmp/bot_monitor_result.txt
            echo "status=${BOT_STATUS}" >> $GITHUB_OUTPUT
            echo "details=${BOT_DETAILS}" >> $GITHUB_OUTPUT
          else
            echo "status=UNREACHABLE" >> $GITHUB_OUTPUT
            echo "details=Cannot connect to VPS" >> $GITHUB_OUTPUT
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}

      - name: Send Telegram alert
        if: always()
        run: |
          STATUS="${{ steps.health.outputs.status }}"
          DETAILS="${{ steps.health.outputs.details }}"
          HOUR=$(date -u +'%H')

          # Always notify on problems
          if [ "$STATUS" = "DOWN" ] || [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CAPTCHA" ] || [ "$STATUS" = "UNREACHABLE" ]; then
            MSG="Bot ${STATUS}
          ${DETAILS}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG:0:4000}" > /dev/null 2>&1 || true

          # Notify OK only at open (13 UTC) and close (20 UTC)
          elif [ "$HOUR" = "13" ] || [ "$HOUR" = "20" ]; then
            MSG="Bot OK
          ${DETAILS}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG:0:4000}" > /dev/null 2>&1 || true
          else
            echo "Bot OK mid-session, no notification needed"
          fi
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
