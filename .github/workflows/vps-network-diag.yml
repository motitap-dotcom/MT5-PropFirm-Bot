name: VPS Network Diagnostics

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/vps-network-diag.yml'
      - 'scripts/network_diag.sh'
      - 'trigger-diag.txt'

permissions:
  contents: write

jobs:
  network-diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run network diagnostics on VPS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          chmod +x scripts/network_diag.sh
          sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no scripts/network_diag.sh root@77.237.234.2:/tmp/network_diag.sh
          sshpass -p 'Moti0417!' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 root@77.237.234.2 "bash /tmp/network_diag.sh" > network_report.txt 2>&1 || true
          echo "EXIT_CODE=$?" >> network_report.txt
          cat network_report.txt

      - name: Commit report
        if: always()
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f network_report.txt
          git commit -m "Network diagnostics $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin HEAD:$BRANCH || true
