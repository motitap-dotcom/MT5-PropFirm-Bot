name: Deploy EA to VPS

on:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
      - '.github/workflows/deploy-ea.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install SSH tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

      - name: Verify secrets exist
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "Checking secrets..."
          if [ -z "$VPS_IP" ]; then echo "ERROR: VPS_IP secret is empty!"; exit 1; fi
          if [ -z "$VPS_PASSWORD" ]; then echo "ERROR: VPS_PASSWORD secret is empty!"; exit 1; fi
          if [ -z "$VPS_USER" ]; then echo "ERROR: VPS_USER secret is empty!"; exit 1; fi
          echo "All secrets present."

      - name: Deploy and compile via SSH
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "=== Deploying via git pull + copy on VPS ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${VPS_USER}@${VPS_IP}" bash << 'REMOTE_SCRIPT'
            set -e
            echo "=== Step 1: Update repo ==="
            cd /root/MT5-PropFirm-Bot || {
              echo "Repo not found, cloning..."
              cd /root
              git clone https://github.com/motitap-dotcom/MT5-PropFirm-Bot.git
              cd MT5-PropFirm-Bot
            }

            BRANCH="${BRANCH:-claude/debug-bot-transactions-wRINL}"
            git fetch origin "$BRANCH" 2>/dev/null || git fetch --all
            git checkout "$BRANCH" 2>/dev/null || true
            git pull origin "$BRANCH" 2>/dev/null || git pull
            echo "Git updated to $(git log --oneline -1)"

            echo "=== Step 2: Find MT5 ==="
            MT5_PATH=""
            for p in "/root/.wine/drive_c/Program Files/MetaTrader 5" \
                     "/root/.wine/drive_c/Program Files (x86)/MetaTrader 5"; do
              if [ -f "$p/terminal64.exe" ]; then
                MT5_PATH="$p"
                break
              fi
            done
            if [ -z "$MT5_PATH" ]; then
              echo "ERROR: MT5 not found!"
              exit 1
            fi
            echo "MT5 at: $MT5_PATH"

            EA_DEST="$MT5_PATH/MQL5/Experts/PropFirmBot"
            CONFIG_DEST="$MT5_PATH/MQL5/Files/PropFirmBot"
            mkdir -p "$EA_DEST" "$CONFIG_DEST"

            echo "=== Step 3: Copy EA files ==="
            COPIED=0
            for f in EA/*.mq5 EA/*.mqh; do
              if [ -f "$f" ]; then
                cp -f "$f" "$EA_DEST/"
                echo "  OK: $(basename $f)"
                COPIED=$((COPIED + 1))
              fi
            done
            echo "Copied $COPIED EA files"

            echo "=== Step 4: Copy config files ==="
            if [ -d "configs" ]; then
              for f in configs/*.json; do
                [ -f "$f" ] && cp -f "$f" "$CONFIG_DEST/" && echo "  OK: $(basename $f)"
              done
            fi

            echo "=== Step 5: Compile ==="
            export DISPLAY=:99
            export WINEPREFIX=/root/.wine
            if [ -f "$MT5_PATH/metaeditor64.exe" ]; then
              wine "$MT5_PATH/metaeditor64.exe" /compile:"$EA_DEST/PropFirmBot.mq5" /log 2>/dev/null || true
              sleep 5
            fi
            if [ -f "$EA_DEST/PropFirmBot.ex5" ]; then
              SIZE=$(stat -c%s "$EA_DEST/PropFirmBot.ex5" 2>/dev/null || echo "?")
              echo "SUCCESS: PropFirmBot.ex5 ($SIZE bytes)"
            else
              echo "WARNING: .ex5 not updated - may need manual compile via VNC"
            fi

            echo "=== DEPLOY COMPLETE ==="
          REMOTE_SCRIPT

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          BRANCH="${{ github.ref_name }}"
          SHORT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | cut -c1-60)
          if [ "$STATUS" = "success" ]; then
            MSG="EA deployed to VPS! Branch: ${BRANCH} | ${SHORT_MSG}"
          else
            MSG="EA deploy FAILED. Branch: ${BRANCH} | ${SHORT_MSG} | Check GitHub Actions"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" > /dev/null 2>&1 || true
