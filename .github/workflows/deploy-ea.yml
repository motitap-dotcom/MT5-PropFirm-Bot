name: Deploy EA to VPS

on:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Upload files to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          # Create tar archive
          tar czf /tmp/ea_deploy.tar.gz EA/ configs/
          echo "Archive size: $(ls -la /tmp/ea_deploy.tar.gz | awk '{print $5}') bytes"

          # Upload to VPS
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 /tmp/ea_deploy.tar.gz ${VPS_USER}@${VPS_IP}:/tmp/ea_deploy.tar.gz
          echo "Upload complete"

      - name: Deploy and restart on VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=5 ${VPS_USER}@${VPS_IP} 'bash -s' << 'ENDSSH'
          set -x
          export DISPLAY=:99

          MT5="/root/.wine/drive_c/Program Files/MetaTrader 5"
          EA_DIR="$MT5/MQL5/Experts/PropFirmBot"
          CFG_DIR="$MT5/MQL5/Files/PropFirmBot"

          # Extract uploaded archive
          cd /tmp && tar xzf ea_deploy.tar.gz

          # Copy files
          cp -v /tmp/EA/*.mq5 "$EA_DIR/" 2>/dev/null
          cp -v /tmp/EA/*.mqh "$EA_DIR/" 2>/dev/null
          cp -v /tmp/configs/*.json "$CFG_DIR/" 2>/dev/null

          # Compile EA (with 30s timeout to avoid hanging)
          echo "=== Compiling ==="
          cd "$EA_DIR"
          timeout 30 wine "$MT5/metaeditor64.exe" /compile:PropFirmBot.mq5 /log 2>/dev/null || echo "Compile timeout/error (continuing anyway)"
          sleep 2
          ls -la PropFirmBot.ex5 2>/dev/null

          # Restart MT5
          echo "=== Restarting MT5 ==="
          pkill -f terminal64 2>/dev/null || true
          sleep 2
          cd "$MT5"
          nohup wine terminal64.exe > /dev/null 2>&1 &
          disown
          sleep 5
          pgrep -f terminal64 > /dev/null && echo "MT5_OK" || echo "MT5_FAIL"

          # Cleanup
          rm -rf /tmp/EA /tmp/configs /tmp/ea_deploy.tar.gz
          echo "=== DONE ==="
          ENDSSH

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && MSG="✅ EA v3.10 deployed - diagnostics active" || MSG="❌ Deploy failed"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" -d text="${MSG}" > /dev/null 2>&1 || true
