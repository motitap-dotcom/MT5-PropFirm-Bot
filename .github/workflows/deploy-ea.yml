name: Deploy EA to VPS

on:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy EA files to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          MT5_BASE="/root/.wine/drive_c/Program Files/MetaTrader 5"
          EA_DIR="${MT5_BASE}/MQL5/Experts/PropFirmBot"
          CONFIG_DIR="${MT5_BASE}/MQL5/Files/PropFirmBot"

          echo "=== Creating directories on VPS ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${VPS_USER}@${VPS_IP} "mkdir -p \"${EA_DIR}\" \"${CONFIG_DIR}\""

          echo "=== Deploying EA files ==="
          for f in EA/*.mq5 EA/*.mqh; do
            [ -f "$f" ] && sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$f" "${VPS_USER}@${VPS_IP}:\"${EA_DIR}/\""
          done

          echo "=== Deploying config files ==="
          for f in configs/*.json; do
            [ -f "$f" ] && sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$f" "${VPS_USER}@${VPS_IP}:\"${CONFIG_DIR}/\""
          done

          echo "=== Recompiling EA on VPS ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${VPS_USER}@${VPS_IP} bash -c "'
            export DISPLAY=:99
            export WINEPREFIX=/root/.wine
            MT5_BASE=\"/root/.wine/drive_c/Program Files/MetaTrader 5\"
            EA_DIR=\"\${MT5_BASE}/MQL5/Experts/PropFirmBot\"
            cd \"\${EA_DIR}\"

            # Try MetaEditor first
            echo \"Attempting MetaEditor compilation...\"
            WINEPREFIX=/root/.wine wine \"\${MT5_BASE}/metaeditor64.exe\" /compile:PropFirmBot.mq5 /log 2>/dev/null || true
            sleep 3

            # Check if .ex5 was updated (newer than .mq5)
            EX5_DATE=\$(stat -c %Y PropFirmBot.ex5 2>/dev/null || echo 0)
            MQ5_DATE=\$(stat -c %Y PropFirmBot.mq5 2>/dev/null || echo 999999)

            if [ \"\$EX5_DATE\" -lt \"\$MQ5_DATE\" ] 2>/dev/null; then
              echo \"MetaEditor failed - using fallback: remove .ex5 + restart MT5\"
              rm -f PropFirmBot.ex5
              echo \"Removed old .ex5\"

              # Restart MT5 to force auto-compile
              MT5_PID=\$(pgrep -f terminal64.exe | head -1)
              if [ -n \"\$MT5_PID\" ]; then
                echo \"Stopping MT5 (PID=\$MT5_PID)...\"
                kill \"\$MT5_PID\" 2>/dev/null
                sleep 5
                pgrep -f terminal64.exe > /dev/null && kill -9 \"\$MT5_PID\" 2>/dev/null
                sleep 3
              fi

              echo \"Starting MT5...\"
              cd \"\${MT5_BASE}\"
              DISPLAY=:99 WINEPREFIX=/root/.wine nohup wine terminal64.exe /portable > /dev/null 2>&1 &
              sleep 20

              if pgrep -f terminal64.exe > /dev/null; then
                echo \"MT5 restarted - will auto-compile EA on load\"
                sleep 10
                ls -la \"\${EA_DIR}/PropFirmBot.ex5\" 2>/dev/null || echo \"ex5 not yet created - MT5 may still be loading\"
              else
                echo \"ERROR: MT5 failed to start!\"
              fi
            else
              echo \"Compilation OK - .ex5 is up to date\"
              ls -la PropFirmBot.ex5 2>/dev/null
            fi
          '" > deploy_report.txt 2>&1 || true

          echo "EXIT_CODE=$?" >> deploy_report.txt
          cat deploy_report.txt

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ EA deployed successfully to VPS"
          else
            MSG="❌ EA deployment failed - check GitHub Actions"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" > /dev/null 2>&1 || true

      - name: Commit deploy report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f deploy_report.txt
          git commit -m "EA deploy report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
