name: Deploy EA to VPS

on:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH connection
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          INPUT_VPS_HOST: ${{ secrets.VPS_HOST }}
          INPUT_VPS_IP: ${{ secrets.VPS_IP }}
          INPUT_VPS_USER: ${{ secrets.VPS_USER }}
          INPUT_VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Determine connection method: SSH Key or Password
          if [ -n "$VPS_SSH_KEY" ]; then
            echo "Using SSH Key authentication"
            echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
            chmod 600 ~/.ssh/vps_key
          elif [ -n "$VPS_PASSWORD" ]; then
            echo "Using password authentication"
            sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          else
            echo "========================================="
            echo "ERROR: No SSH credentials configured!"
            echo ""
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions"
            echo "Add these secrets:"
            echo "  VPS_PASSWORD = your VPS root password"
            echo "  VPS_HOST     = your VPS IP address"
            echo "========================================="
            exit 1
          fi

          # Determine host and user
          VPS_HOST="${INPUT_VPS_HOST}"
          [ -z "$VPS_HOST" ] && VPS_HOST="${INPUT_VPS_IP}"
          if [ -z "$VPS_HOST" ]; then
            echo "ERROR: VPS_HOST or VPS_IP secret is not set!"
            exit 1
          fi
          VPS_USER="${INPUT_VPS_USER}"
          [ -z "$VPS_USER" ] && VPS_USER="root"
          VPS_PORT="${INPUT_VPS_PORT}"
          [ -z "$VPS_PORT" ] && VPS_PORT="22"

          echo "VPS_HOST=${VPS_HOST}" >> $GITHUB_ENV
          echo "VPS_USER=${VPS_USER}" >> $GITHUB_ENV
          echo "VPS_PORT=${VPS_PORT}" >> $GITHUB_ENV
          echo "Connection: ${VPS_USER}@${VPS_HOST}:${VPS_PORT}"

      - name: Deploy EA files to VPS
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          # Build SSH/SCP commands with port
          if [ -f ~/.ssh/vps_key ]; then
            SSH="ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -p ${VPS_PORT}"
            SCP="scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -P ${VPS_PORT}"
          else
            SSH="sshpass -p ${VPS_PASSWORD} ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -p ${VPS_PORT}"
            SCP="sshpass -p ${VPS_PASSWORD} scp -o StrictHostKeyChecking=no -P ${VPS_PORT}"
          fi

          # Stage files to /tmp first (avoids spaces-in-path issues with SCP)
          echo "=== Uploading EA files to /tmp/ea_deploy ==="
          $SSH ${VPS_USER}@${VPS_HOST} "rm -rf /tmp/ea_deploy && mkdir -p /tmp/ea_deploy/EA /tmp/ea_deploy/configs"

          for f in EA/*.mq5 EA/*.mqh; do
            [ -f "$f" ] && echo "  Uploading $f" && $SCP "$f" "${VPS_USER}@${VPS_HOST}:/tmp/ea_deploy/EA/"
          done

          for f in configs/*.json; do
            [ -f "$f" ] && echo "  Uploading $f" && $SCP "$f" "${VPS_USER}@${VPS_HOST}:/tmp/ea_deploy/configs/"
          done

          echo "=== Moving files to MT5 directories and recompiling ==="
          $SSH ${VPS_USER}@${VPS_HOST} 'bash -s' << 'REMOTE_SCRIPT'
            set -e
            MT5_BASE="/root/.wine/drive_c/Program Files/MetaTrader 5"
            EA_DIR="${MT5_BASE}/MQL5/Experts/PropFirmBot"
            CONFIG_DIR="${MT5_BASE}/MQL5/Files/PropFirmBot"

            mkdir -p "${EA_DIR}" "${CONFIG_DIR}"

            echo "--- Copying EA files ---"
            cp -v /tmp/ea_deploy/EA/* "${EA_DIR}/" 2>/dev/null || echo "No EA files to copy"

            echo "--- Copying config files ---"
            cp -v /tmp/ea_deploy/configs/* "${CONFIG_DIR}/" 2>/dev/null || echo "No config files to copy"

            echo "--- Recompiling EA ---"
            cd "${EA_DIR}"
            WINEPREFIX=/root/.wine wine "${MT5_BASE}/metaeditor64.exe" /compile:PropFirmBot.mq5 /log 2>/dev/null || true
            sleep 3
            ls -la *.ex5 2>/dev/null && echo "Compilation OK" || echo "Warning: .ex5 not updated"

            echo "--- Restarting MT5 ---"
            pkill -f terminal64.exe 2>/dev/null || true
            sleep 2
            export DISPLAY=:99
            nohup wine "${MT5_BASE}/terminal64.exe" > /dev/null 2>&1 &
            sleep 5
            pgrep -f terminal64.exe && echo "MT5 restarted OK" || echo "WARNING: MT5 not running"

            rm -rf /tmp/ea_deploy
            echo "=== Deploy complete ==="
          REMOTE_SCRIPT
          echo "EXIT_CODE=$?" > deploy_report.txt
          echo "Deploy finished at $(date -u '+%Y-%m-%d %H:%M UTC')" >> deploy_report.txt

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured, skipping notification"
            exit 0
          fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ EA deployed successfully to VPS"
          else
            MSG="❌ EA deployment failed - check GitHub Actions"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" > /dev/null 2>&1 || true

      - name: Commit deploy report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f deploy_report.txt
          git commit -m "EA deploy report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
