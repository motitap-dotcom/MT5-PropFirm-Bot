name: Deploy EA to VPS

on:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy EA files to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          MT5_BASE="/root/.wine/drive_c/Program Files/MetaTrader 5"
          EA_DIR="${MT5_BASE}/MQL5/Experts/PropFirmBot"
          CONFIG_DIR="${MT5_BASE}/MQL5/Files/PropFirmBot"

          echo "=== Deploying EA files ==="
          for f in EA/*.mq5 EA/*.mqh; do
            [ -f "$f" ] && echo "  Copying $f..." && sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$f" "${VPS_USER}@${VPS_IP}:\"${EA_DIR}/\""
          done

          echo "=== Deploying config files ==="
          for f in configs/*.json; do
            [ -f "$f" ] && echo "  Copying $f..." && sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$f" "${VPS_USER}@${VPS_IP}:\"${CONFIG_DIR}/\""
          done

          echo "=== Recompiling EA on VPS ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${VPS_USER}@${VPS_IP} bash -c "'
            export DISPLAY=:99
            cd \"${EA_DIR}\"
            # Use MetaEditor to compile
            WINEPREFIX=/root/.wine wine \"/root/.wine/drive_c/Program Files/MetaTrader 5/metaeditor64.exe\" /compile:PropFirmBot.mq5 /log 2>/dev/null || true
            sleep 5
            ls -la *.ex5 2>/dev/null && echo \"Compilation OK\" || echo \"Warning: .ex5 not updated\"
            echo \"\"
            echo \"=== Restarting MT5 to reload EA ===\"
            pkill -f terminal64 2>/dev/null || true
            sleep 2
            cd \"/root/.wine/drive_c/Program Files/MetaTrader 5\"
            WINEPREFIX=/root/.wine wine terminal64.exe &
            sleep 10
            pgrep -f terminal64 && echo \"MT5 restarted OK\" || echo \"MT5 restart FAILED\"
          '"

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ EA deployed and recompiled on VPS. Bot restarting with updated signals."
          else
            MSG="❌ EA deployment failed - check GitHub Actions"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" > /dev/null 2>&1 || true

      - name: Commit deploy report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f deploy_report.txt 2>/dev/null || true
          git commit -m "EA deploy report $(date -u '+%Y-%m-%d %H:%M UTC')" 2>/dev/null || true
          git push || true
