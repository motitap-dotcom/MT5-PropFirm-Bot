name: Deploy EA to VPS

on:
  push:
    paths:
      - 'EA/**'
      - 'configs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-bot-server-connection-JbPec

      - name: Deploy EA files to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          MT5_BASE="/root/.wine/drive_c/Program Files/MetaTrader 5"
          EA_DIR="${MT5_BASE}/MQL5/Experts/PropFirmBot"
          CONFIG_DIR="${MT5_BASE}/MQL5/Files/PropFirmBot"

          echo "=== Deploying EA files ==="
          for f in EA/*.mq5 EA/*.mqh; do
            [ -f "$f" ] && sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$f" "${VPS_USER}@${VPS_IP}:\"${EA_DIR}/\""
          done

          echo "=== Deploying config files ==="
          for f in configs/*.json; do
            [ -f "$f" ] && sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$f" "${VPS_USER}@${VPS_IP}:\"${CONFIG_DIR}/\""
          done

          echo "=== Restarting MT5 to load updated EA ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${VPS_USER}@${VPS_IP} bash -c "'
            EA_DIR=\"${EA_DIR}\"
            MT5=\"${MT5_BASE}\"

            echo \"--- Stopping MT5 ---\"
            MT5_PID=\$(pgrep -f terminal64.exe | head -1)
            if [ -n \"\$MT5_PID\" ]; then
              kill \$MT5_PID
              sleep 5
              echo \"MT5 stopped (was PID \$MT5_PID)\"
            fi

            echo \"--- Starting MT5 fresh (will auto-compile .mq5) ---\"
            export DISPLAY=:99
            export WINEPREFIX=/root/.wine
            wine \"\$MT5/terminal64.exe\" /login:11797849 /password:gazDE62## /server:FundedNext-Server &
            sleep 20

            echo \"--- Checking if running ---\"
            pgrep -la terminal64 || echo \"MT5 FAILED TO START!\"

            echo \"--- .ex5 status ---\"
            ls -la \"\$EA_DIR/\"*.ex5 2>/dev/null || echo \"No .ex5 found!\"

            echo \"--- Latest terminal log ---\"
            TLOG=\$(ls -t \"\$MT5/logs/\"*.log 2>/dev/null | head -1)
            if [ -n \"\$TLOG\" ]; then
              cat \"\$TLOG\" | tr -d \"\\0\" | tail -10
            fi

            echo \"--- Latest EA log ---\"
            EALOG=\$(ls -t \"\$MT5/MQL5/Logs/\"*.log 2>/dev/null | head -1)
            if [ -n \"\$EALOG\" ]; then
              cat \"\$EALOG\" | tr -d \"\\0\" | tail -10
            fi
          '" > deploy_report.txt 2>&1 || true

          echo "EXIT_CODE=$?" >> deploy_report.txt
          cat deploy_report.txt

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ EA v3.11 deployed & MT5 restarted on VPS"
          else
            MSG="❌ EA deployment failed - check GitHub Actions"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" > /dev/null 2>&1 || true

      - name: Commit deploy report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f deploy_report.txt
          git commit -m "EA deploy report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin claude/fix-bot-server-connection-JbPec || true
