name: Deploy Bot
on:
  push:
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            # Install/update dependencies
            pip3 install -r requirements.txt

            # Write fresh secrets to .env (systemd reads from this file)
            cat > .env << 'ENVEOF'
            TRADOVATE_USER=${{ secrets.TRADOVATE_USER }}
            TRADOVATE_PASS=${{ secrets.TRADOVATE_PASS }}
            TRADOVATE_ACCESS_TOKEN=${{ secrets.TRADOVATE_ACCESS_TOKEN }}
            TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env

            # Restart bot service
            systemctl daemon-reload
            systemctl restart futures-bot 2>/dev/null || echo "Service not yet installed"

            echo "Deploy completed at $(date -u +'%Y-%m-%d %H:%M UTC')" > deploy_report.txt
            python3 -c "import sys; sys.path.insert(0,'.'); import futures_bot; print('Import OK')" >> deploy_report.txt 2>&1

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy completed
            Status: ${{ job.status }}
