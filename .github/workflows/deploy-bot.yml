name: Deploy Bot
on:
  push:
    branches:
      - main
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  pre-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          for f in $(find futures_bot -name "*.py"); do
            python -m py_compile "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

  deploy:
    needs: pre-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e
            cd /root/MT5-PropFirm-Bot
            git fetch origin main
            git reset --hard origin/main
            echo "Now at: $(git log -1 --oneline)"

            pip3 install -r requirements.txt -q 2>&1 | tail -3

            systemctl daemon-reload
            systemctl restart futures-bot
            sleep 15

            # Verify bot started
            if systemctl is-active --quiet futures-bot; then
              echo "BOT: RUNNING"
              journalctl -u futures-bot --no-pager -n 20 | tail -20
              # Check for fatal errors
              if journalctl -u futures-bot --no-pager -n 20 | grep -qi "fatal\|traceback\|error.*auth"; then
                echo "WARNING: Errors detected in startup logs"
              fi
            else
              echo "BOT: FAILED TO START"
              journalctl -u futures-bot --no-pager -n 30
              exit 1
            fi

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy: ${{ job.status }}
            Commit: ${{ github.sha }}
