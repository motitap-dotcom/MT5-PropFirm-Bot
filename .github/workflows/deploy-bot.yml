name: Deploy Bot
on:
  push:
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'
      - 'scripts/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            mkdir -p status logs configs
            pip3 install -r requirements.txt
            python3 -m playwright install chromium --with-deps 2>/dev/null || echo "Playwright install skipped"
            echo "TRADOVATE_USER=${{ secrets.TRADOVATE_USER }}" > .env
            echo "TRADOVATE_PASS=${{ secrets.TRADOVATE_PASS }}" >> .env
            echo "TRADOVATE_ACCESS_TOKEN=${{ secrets.TRADOVATE_ACCESS_TOKEN }}" >> .env
            echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            chmod +x scripts/start_bot.sh
            cp scripts/futures-bot.service /etc/systemd/system/futures-bot.service
            systemctl daemon-reload
            systemctl reset-failed futures-bot 2>/dev/null
            systemctl restart futures-bot
            sleep 15
            echo "Service: $(systemctl is-active futures-bot)"
            tail -15 logs/bot.log 2>/dev/null || echo "No logs yet"

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy completed
            Status: ${{ job.status }}
