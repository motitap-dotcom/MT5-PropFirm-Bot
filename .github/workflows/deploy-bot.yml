name: Deploy Bot
on:
  push:
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            # Install/update dependencies
            pip3 install -r requirements.txt

            # Write fresh secrets to .env (systemd reads from this file)
            echo "TRADOVATE_USER=${{ secrets.TRADOVATE_USER }}" > .env
            echo "TRADOVATE_PASS=${{ secrets.TRADOVATE_PASS }}" >> .env
            echo "TRADOVATE_ACCESS_TOKEN=${{ secrets.TRADOVATE_ACCESS_TOKEN }}" >> .env
            echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env

            # Restart bot service
            systemctl daemon-reload
            systemctl restart futures-bot 2>/dev/null || echo "Service not yet installed"

            # Create deploy report
            echo "Deploy completed at $(date -u +'%Y-%m-%d %H:%M UTC')" > deploy_report.txt
            python3 -c "import sys; sys.path.insert(0,'.'); import futures_bot; print('Import OK')" >> deploy_report.txt 2>&1
            systemctl is-active futures-bot >> deploy_report.txt 2>&1 || true
            echo "--- Last 10 journal lines ---" >> deploy_report.txt
            journalctl -u futures-bot --no-pager -n 10 >> deploy_report.txt 2>&1 || true

            # Commit report back to repo
            git add deploy_report.txt status/status.json 2>/dev/null || true
            git commit -m "Deploy report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin HEAD:${{ github.ref_name }} || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy completed
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}
            Report committed to deploy_report.txt
