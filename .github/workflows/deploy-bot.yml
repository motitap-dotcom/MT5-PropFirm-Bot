name: Deploy Bot
on:
  push:
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: false
          command_timeout: 15m
          script: |
            cd /root/MT5-PropFirm-Bot
            pkill -f chromium 2>/dev/null || true
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            test -d venv || python3 -m venv venv
            venv/bin/pip install -r requirements.txt 2>&1 | tail -5
            venv/bin/python3 -m playwright install chromium --with-deps 2>&1 | tail -3
            pip3 install -r requirements.txt 2>&1 | tail -3
            venv/bin/python3 -c "from futures_bot.core.tradovate_client import TradovateClient; print('Import OK')"
            venv/bin/python3 -c "from playwright.sync_api import sync_playwright; print('Playwright OK')"
            echo "TRADOVATE_USER=${{ secrets.TRADOVATE_USER }}" > .env
            echo "TRADOVATE_PASS=${{ secrets.TRADOVATE_PASS }}" >> .env
            echo "TRADOVATE_ACCESS_TOKEN=${{ secrets.TRADOVATE_ACCESS_TOKEN }}" >> .env
            echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}" >> .env
            echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
            rm -f configs/.tradovate_token.json
            printf '[Unit]\nDescription=TradeDay Futures Trading Bot\nAfter=network.target\n\n[Service]\nType=simple\nWorkingDirectory=/root/MT5-PropFirm-Bot\nExecStart=/root/MT5-PropFirm-Bot/venv/bin/python3 -m futures_bot.bot\nRestart=on-failure\nRestartSec=60\nEnvironment=PYTHONUNBUFFERED=1\nEnvironmentFile=/root/MT5-PropFirm-Bot/.env\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/futures-bot.service
            systemctl daemon-reload
            systemctl restart futures-bot
            sleep 15
            echo "Service: $(systemctl is-active futures-bot)"
            tail -15 logs/bot.log 2>/dev/null || echo "No logs yet"

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy completed
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}
