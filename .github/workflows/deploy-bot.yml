name: Deploy Bot
on:
  push:
    branches:
      - main
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  pre-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          for f in $(find futures_bot -name "*.py"); do
            python -m py_compile "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

  deploy:
    needs: pre-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 5m
          script: |
            set -e
            cd /root/MT5-PropFirm-Bot

            # Preserve token
            cp configs/.tradovate_token.json /tmp/.tradovate_token_backup.json 2>/dev/null || true

            git fetch origin main
            git reset --hard origin/main
            echo "Now at: $(git log -1 --oneline)"

            # Restore token
            cp /tmp/.tradovate_token_backup.json configs/.tradovate_token.json 2>/dev/null || true

            pip3 install -r requirements.txt -q 2>&1 | tail -3
            if ! python3 -c "import playwright" 2>/dev/null; then
              pip3 install playwright -q && python3 -m playwright install chromium 2>&1 | tail -3
            fi

            # Fix service with PYTHONPATH
            cat > /etc/systemd/system/futures-bot.service << 'SVCEOF'
[Unit]
Description=TradeDay Futures Trading Bot
After=network.target

[Service]
Type=simple
WorkingDirectory=/root/MT5-PropFirm-Bot
ExecStart=/usr/bin/python3 -m futures_bot.bot
Restart=on-failure
RestartSec=60
Environment=PYTHONUNBUFFERED=1
Environment=PYTHONPATH=/root/MT5-PropFirm-Bot
EnvironmentFile=/root/MT5-PropFirm-Bot/.env

[Install]
WantedBy=multi-user.target
SVCEOF

            systemctl daemon-reload
            systemctl reset-failed futures-bot 2>/dev/null || true
            systemctl restart futures-bot
            sleep 15

            if systemctl is-active --quiet futures-bot; then
              echo "BOT: RUNNING"
              journalctl -u futures-bot --no-pager -n 20 | tail -20
            else
              echo "BOT: FAILED"
              journalctl -u futures-bot --no-pager -n 20
            fi

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy: ${{ job.status }}
            Commit: ${{ github.sha }}
