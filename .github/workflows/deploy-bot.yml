name: Deploy Bot
on:
  push:
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            cd /root/MT5-PropFirm-Bot
            git pull origin ${{ github.ref_name }}

            # Install/update dependencies
            pip3 install -r requirements.txt

            # Set environment variables
            export TRADOVATE_USER="${{ secrets.TRADOVATE_USER }}"
            export TRADOVATE_PASS="${{ secrets.TRADOVATE_PASS }}"
            export TRADOVATE_APP_ID="${{ secrets.TRADOVATE_APP_ID }}"
            export TRADOVATE_CID="${{ secrets.TRADOVATE_CID }}"
            export TRADOVATE_SEC="${{ secrets.TRADOVATE_SEC }}"
            export TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
            export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

            # Restart bot service
            systemctl restart futures-bot 2>/dev/null || echo "Service not yet installed"

            echo "Deploy completed at $(date -u +'%Y-%m-%d %H:%M UTC')" > deploy_report.txt
            python3 -c "import futures_bot; print('Import OK')" >> deploy_report.txt 2>&1

            git add deploy_report.txt
            git commit -m "Deploy report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin ${{ github.ref_name }} || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy completed
            Status: ${{ job.status }}
