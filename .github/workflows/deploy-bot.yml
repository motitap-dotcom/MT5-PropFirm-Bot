name: Deploy Bot
on:
  push:
    paths:
      - 'futures_bot/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TRADOVATE_ACCESS_TOKEN,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          command_timeout: 10m
          script: |
            cd /root/MT5-PropFirm-Bot
            pkill -f chromium 2>/dev/null || true
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            mkdir -p status logs configs
            pip3 install -r requirements.txt 2>&1 | tail -3
            python3 -m playwright install chromium --with-deps 2>&1 | tail -3 || true
            echo "TRADOVATE_USER=$TRADOVATE_USER" > .env
            echo "TRADOVATE_PASS=$TRADOVATE_PASS" >> .env
            echo "TRADOVATE_ACCESS_TOKEN=$TRADOVATE_ACCESS_TOKEN" >> .env
            echo "TELEGRAM_TOKEN=$TELEGRAM_TOKEN" >> .env
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> .env
            printf '#!/bin/bash\ncd /root/MT5-PropFirm-Bot\nexport PYTHONPATH=/root/MT5-PropFirm-Bot\nexec /usr/bin/python3 -m futures_bot.bot\n' > /usr/local/bin/start-futures-bot.sh
            chmod +x /usr/local/bin/start-futures-bot.sh
            printf '[Unit]\nDescription=TradeDay Futures Trading Bot\nAfter=network.target\n\n[Service]\nType=simple\nExecStart=/usr/local/bin/start-futures-bot.sh\nRestart=on-failure\nRestartSec=60\nEnvironment=PYTHONUNBUFFERED=1\nEnvironmentFile=/root/MT5-PropFirm-Bot/.env\n\n[Install]\nWantedBy=multi-user.target\n' > /etc/systemd/system/futures-bot.service
            systemctl daemon-reload
            systemctl reset-failed futures-bot 2>/dev/null
            systemctl restart futures-bot
            sleep 15
            echo "Service: $(systemctl is-active futures-bot)"
            tail -20 logs/bot.log 2>/dev/null || echo "No logs yet"
        env:
          TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
          TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
          TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Bot Deploy completed
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}
