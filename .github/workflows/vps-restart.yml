name: VPS Start MT5 + Watchdog

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/vps-restart.yml'
      - 'trigger-restart.txt'
      - 'scripts/watchdog.sh'

permissions:
  contents: write

jobs:
  restart-mt5:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Start MT5 and install watchdog
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          SSH="sshpass -p Moti0417! ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@77.237.234.2"
          SCP="sshpass -p Moti0417! scp -o StrictHostKeyChecking=no"

          $SCP scripts/watchdog.sh root@77.237.234.2:/tmp/watchdog.sh

          echo "=== Starting MT5 + Watchdog ===" | tee restart_report.txt
          $SSH "bash -s" <<'REMOTE' 2>&1 | tee -a restart_report.txt
          export DISPLAY=:99
          export WINEPREFIX=/root/.wine
          MT5="/root/.wine/drive_c/Program Files/MetaTrader 5"

          echo "=== Pre-flight ==="
          echo "EA: $([ -f "$MT5/MQL5/Experts/PropFirmBot/PropFirmBot.ex5" ] && echo "YES ($(stat -c%s "$MT5/MQL5/Experts/PropFirmBot/PropFirmBot.ex5") bytes)" || echo "MISSING")"

          pgrep -x Xvfb > /dev/null 2>&1 || (Xvfb :99 -screen 0 1280x1024x24 &>/dev/null & sleep 2)
          pgrep -x x11vnc > /dev/null 2>&1 || (x11vnc -display :99 -forever -shared -rfbport 5900 -nopw -bg 2>/dev/null)

          pkill -f terminal64.exe 2>/dev/null; sleep 2
          wineserver -k 2>/dev/null; sleep 3

          # Ensure correct servers.dat (use bigger backup if needed)
          if [ $(stat -c%s "$MT5/config/servers.dat" 2>/dev/null || echo 0) -lt 60000 ]; then
              cp "$MT5/Config/servers.dat" "$MT5/config/servers.dat" 2>/dev/null
              echo "Restored servers.dat from backup"
          fi

          # Create startup config with password (most reliable login method)
          cat > "$MT5/config/startup.ini" << 'SEOF'
[Common]
Login=11797849
Password=gazDE62##
Server=FundedNext-Server
ProxyEnable=0
CertInstall=0
NewsEnable=0
EnableOpenCL=7
Services=4294967295
Source=download.mql5.com
[StartUp]
Expert=PropFirmBot\PropFirmBot
ExpertParameters=
Symbol=EURUSD
Period=M15
[Experts]
AllowLiveTrading=1
AllowDllImport=0
Enabled=1
Account=1
Profile=0
Chart=0
WebRequest=1
[Charts]
ProfileLast=Default
MaxBars=100000
TradeHistory=1
TradeLevels=1
PreloadCharts=1
SEOF

          echo "Starting MT5 with config file..."
          cd "$MT5"
          nohup wine terminal64.exe "/config:C:\Program Files\MetaTrader 5\config\startup.ini" </dev/null >/dev/null 2>&1 &
          disown -a
          echo "Waiting 60s for connection + symbol sync..."
          sleep 60

          PID=$(pgrep -f terminal64.exe 2>/dev/null || true)
          [ -n "$PID" ] && echo "MT5 RUNNING! PID: $PID" || echo "MT5 not started yet"

          # Check terminal log for connection
          TLOG=$(ls -t "$MT5/logs/"*.log 2>/dev/null | head -1)
          [ -n "$TLOG" ] && echo "Terminal log:" && cat "$TLOG" | tr -d '\0' | tail -15

          echo ""
          echo "=== Installing Watchdog ==="
          mkdir -p /root/PropFirmBot/scripts /root/PropFirmBot/logs /root/PropFirmBot/state
          cp /tmp/watchdog.sh /root/PropFirmBot/scripts/watchdog.sh
          chmod +x /root/PropFirmBot/scripts/watchdog.sh

          CRON_TMP=$(mktemp)
          crontab -l 2>/dev/null > "$CRON_TMP" || true
          sed -i '/PropFirmBot/d' "$CRON_TMP"
          echo "*/2 * * * * /root/PropFirmBot/scripts/watchdog.sh  # PropFirmBot watchdog" >> "$CRON_TMP"
          crontab "$CRON_TMP" && rm "$CRON_TMP"

          echo "Watchdog cron:"
          crontab -l | grep PropFirmBot

          PID=$(pgrep -f terminal64.exe 2>/dev/null || true)
          [ -n "$PID" ] && echo "up" > /root/PropFirmBot/state/mt5_status || echo "unknown" > /root/PropFirmBot/state/mt5_status
          echo "0" > /root/PropFirmBot/state/restart_count

          curl -s "https://api.telegram.org/bot8452836462:AAEVGDT5JrxOHAcB8Nd8ayObU1iMQUCRk2g/sendMessage" -d "chat_id=7013213983" -d "text=PropFirmBot: MT5 started + Watchdog installed! $(date '+%d/%m/%Y %H:%M UTC')" > /dev/null 2>&1

          echo "=== DONE ==="
          REMOTE

      - name: Verify
        run: |
          sleep 30
          echo "=== VERIFICATION ===" | tee -a restart_report.txt
          sshpass -p 'Moti0417!' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@77.237.234.2 "bash -s" <<'VERIFY' 2>&1 | tee -a restart_report.txt
          MT5="/root/.wine/drive_c/Program Files/MetaTrader 5"
          echo "=== STATUS $(date '+%Y-%m-%d %H:%M:%S UTC') ==="
          echo "MT5: $(pgrep -f terminal64.exe > /dev/null 2>&1 && echo RUNNING || echo NOT_RUNNING)"
          ps aux | grep terminal64 | grep -v grep | awk '{printf "  PID:%s CPU:%s%% MEM:%s%%\n", $2, $3, $4}'
          echo "EA: $([ -f "$MT5/MQL5/Experts/PropFirmBot/PropFirmBot.ex5" ] && echo "COMPILED ($(stat -c%s "$MT5/MQL5/Experts/PropFirmBot/PropFirmBot.ex5") bytes)" || echo "NOT FOUND")"
          echo "VNC: $(pgrep -x x11vnc > /dev/null 2>&1 && echo RUNNING || echo NOT_RUNNING)"
          echo "Watchdog: $(crontab -l 2>/dev/null | grep -q PropFirmBot && echo ACTIVE || echo NOT_SET)"
          echo "Connections:"
          ss -tn state established 2>/dev/null | grep -v ":22 \|:5900 \|:53 " | head -5
          TLOG=$(ls -t "$MT5/logs/"*.log 2>/dev/null | head -1)
          [ -n "$TLOG" ] && echo "Terminal (last 10):" && cat "$TLOG" | tr -d '\0' | tail -10
          TODAY=$(date '+%Y%m%d')
          EALOG="$MT5/MQL5/Logs/${TODAY}.log"
          [ -f "$EALOG" ] && echo "EA log:" && cat "$EALOG" | tr -d '\0' | tail -10
          VERIFY

      - name: Commit report
        if: always()
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f restart_report.txt
          git commit -m "VPS restart report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin HEAD:$BRANCH || true
