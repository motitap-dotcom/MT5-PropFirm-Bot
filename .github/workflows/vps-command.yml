name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git checkout ${{ github.ref_name }} 2>/dev/null || git checkout -b ${{ github.ref_name }} origin/${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            bash commands/run.sh 2>&1

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
