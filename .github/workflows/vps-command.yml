name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
      TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
      TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Run command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TRADOVATE_ACCESS_TOKEN,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          command_timeout: 10m
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git show origin/${{ github.ref_name }}:commands/run.sh > /tmp/vps_run.sh
            bash /tmp/vps_run.sh

      - name: Fetch output
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        id: fetch
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 2m
          capture_stdout: true
          script: |
            cat /root/MT5-PropFirm-Bot/commands/output.txt 2>/dev/null || echo "No output file"

      - name: Save output
        run: |
          echo "${{ steps.fetch.outputs.stdout }}" > commands/output.txt 2>/dev/null || echo "No output" > commands/output.txt
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f commands/output.txt
          git diff --cached --quiet || git commit -m "VPS output [auto]"
          git push origin ${{ github.ref_name }} || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}
