name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Copy script to VPS and run
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          # Copy run.sh to VPS
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no commands/run.sh ${VPS_USER}@${VPS_HOST}:/tmp/run.sh

          # Run it on VPS
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${VPS_USER}@${VPS_HOST} "
            cd /root/MT5-PropFirm-Bot
            export TRADOVATE_USER='$TRADOVATE_USER'
            export TRADOVATE_PASS='$TRADOVATE_PASS'
            export TRADOVATE_ACCESS_TOKEN='$TRADOVATE_ACCESS_TOKEN'
            export TELEGRAM_TOKEN='$TELEGRAM_TOKEN'
            export TELEGRAM_CHAT_ID='$TELEGRAM_CHAT_ID'
            bash /tmp/run.sh > /tmp/vps_output.txt 2>&1
            cat /tmp/vps_output.txt
          "

          # Fetch output back
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST}:/tmp/vps_output.txt commands/output.txt 2>/dev/null || echo "Failed to fetch output" > commands/output.txt
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
          TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
          TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit output back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add commands/output.txt
          git diff --staged --quiet && echo "No changes" || (git commit -m "VPS output $(date -u +'%Y-%m-%d %H:%M UTC')" && git push) || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Status: ${{ job.status }}
