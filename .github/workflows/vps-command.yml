name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass > /dev/null 2>&1

      - name: Write .env on VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cat > /root/MT5-PropFirm-Bot/.env" << 'ENVEOF'
          TRADOVATE_USER=${{ secrets.TRADOVATE_USER }}
          TRADOVATE_PASS=${{ secrets.TRADOVATE_PASS }}
          TRADOVATE_ACCESS_TOKEN=${{ secrets.TRADOVATE_ACCESS_TOKEN }}
          TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          ENVEOF

      - name: Run command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 10m
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin claude/build-cfd-trading-bot-fl0ld
            git reset --hard origin/claude/build-cfd-trading-bot-fl0ld
            bash commands/run.sh > commands/output.txt 2>&1
            cat commands/output.txt

      - name: Fetch output from VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/MT5-PropFirm-Bot/commands/output.txt commands/output.txt

      - name: Push output to repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add commands/output.txt
          if ! git diff --cached --quiet; then
            git commit -m "VPS output $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:claude/build-cfd-trading-bot-fl0ld
          fi

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Status: ${{ job.status }}
