name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
      TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
      TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Run command on VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TRADOVATE_ACCESS_TOKEN,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          command_timeout: 10m
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin claude/build-cfd-trading-bot-fl0ld
            git reset --hard origin/claude/build-cfd-trading-bot-fl0ld
            bash commands/run.sh > commands/output.txt 2>&1
            cat commands/output.txt

      - name: Fetch output (base64 safe)
        if: always()
        id: fetch
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 1m
          capture_stdout: true
          script: base64 /root/MT5-PropFirm-Bot/commands/output.txt 2>/dev/null || echo "NOFILE"

      - name: Decode and push output
        if: always()
        run: |
          B64="${{ steps.fetch.outputs.stdout }}"
          if [ -n "$B64" ] && [ "$B64" != "NOFILE" ]; then
            echo "$B64" | base64 -d > commands/output.txt
          else
            echo "Failed to fetch output from VPS" > commands/output.txt
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin claude/build-cfd-trading-bot-fl0ld
          git reset --soft origin/claude/build-cfd-trading-bot-fl0ld
          git add commands/output.txt
          if ! git diff --cached --quiet; then
            git commit -m "VPS output $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:claude/build-cfd-trading-bot-fl0ld
          fi

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Status: ${{ job.status }}
