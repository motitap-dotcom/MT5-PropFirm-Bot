name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
      TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
      TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Run command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TRADOVATE_ACCESS_TOKEN,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          command_timeout: 10m
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }} 2>/dev/null
            git show origin/${{ github.ref_name }}:commands/run.sh > /tmp/vps_run.sh 2>/dev/null
            bash /tmp/vps_run.sh 2>&1 | tail -80 > /tmp/vps_output.txt
            cat /tmp/vps_output.txt

      - name: Get VPS output
        id: vps
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          capture_stdout: true
          script: |
            cat /tmp/vps_output.txt 2>/dev/null || echo "No output"

      - name: Post to Issue
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.vps.outputs.stdout }}` || 'No output captured';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 22,
              body: `### VPS Status - ${new Date().toISOString()}\n\`\`\`\n${output.substring(0, 3000)}\n\`\`\``
            });

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}
