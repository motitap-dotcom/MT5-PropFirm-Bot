name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    env:
      TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
      TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
      TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Run command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TRADOVATE_ACCESS_TOKEN,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          command_timeout: 10m
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            mkdir -p status
            bash commands/run.sh
            git config user.name "VPS Bot"
            git config user.email "bot@vps"
            git add -f commands/output.txt status/status.json 2>/dev/null
            git commit -m "VPS output [auto]" 2>/dev/null || true
            git push origin HEAD:${{ github.ref_name }} 2>/dev/null || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Branch: ${{ github.ref_name }}
            Status: ${{ job.status }}
