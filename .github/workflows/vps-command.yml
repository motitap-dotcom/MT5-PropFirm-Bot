name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
      TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
      TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
          which sshpass && echo "sshpass OK"

      - name: Run command on VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TRADOVATE_ACCESS_TOKEN,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          command_timeout: 10m
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin claude/build-cfd-trading-bot-fl0ld
            git reset --hard origin/claude/build-cfd-trading-bot-fl0ld
            bash commands/run.sh > commands/output.txt 2>&1
            echo "OUTPUT_FILE_SIZE=$(wc -c < commands/output.txt)"
            cat commands/output.txt

      - name: Fetch output via SCP
        if: always()
        run: |
          echo "Attempting SCP..."
          sshpass -p "${{ secrets.VPS_PASSWORD }}" scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/MT5-PropFirm-Bot/commands/output.txt" commands/output.txt
          echo "SCP exit code: $?"
          echo "Local file size: $(wc -c < commands/output.txt 2>/dev/null || echo 'MISSING')"

      - name: Fallback - write error output
        if: failure()
        run: echo "SCP failed - check Actions log for SSH output" > commands/output.txt

      - name: Push output to repo
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin claude/build-cfd-trading-bot-fl0ld
          git reset --soft origin/claude/build-cfd-trading-bot-fl0ld
          git add commands/output.txt
          if ! git diff --cached --quiet; then
            git commit -m "VPS output $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:claude/build-cfd-trading-bot-fl0ld
          fi

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Status: ${{ job.status }}
