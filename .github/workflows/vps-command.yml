name: VPS Command
on:
  push:
    paths:
      - 'commands/run.sh'

jobs:
  run-command:
    runs-on: ubuntu-latest
    env:
      TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
      TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
      TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Run command on VPS
        run: |
          sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'
          cd /root/MT5-PropFirm-Bot
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.ref_name }} 2>/dev/null || git checkout -b ${{ github.ref_name }} origin/${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

          export TRADOVATE_USER="${{ secrets.TRADOVATE_USER }}"
          export TRADOVATE_PASS="${{ secrets.TRADOVATE_PASS }}"
          export TRADOVATE_ACCESS_TOKEN="${{ secrets.TRADOVATE_ACCESS_TOKEN }}"
          export TELEGRAM_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
          export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

          bash commands/run.sh > commands/output.txt 2>&1
          cat commands/output.txt

          git add commands/output.txt status/status.json 2>/dev/null
          git commit -m "VPS output $(date -u +'%Y-%m-%d %H:%M UTC')" || true
          git push origin ${{ github.ref_name }} || true
          REMOTE

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Command completed
            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
