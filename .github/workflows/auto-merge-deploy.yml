name: Auto-merge & Deploy

on:
  push:
    branches:
      - 'claude/**'
    paths-ignore:
      - '*.md'
      - 'server_status.json'
      - 'system_status.json'
      - 'commands/**'
      - 'trigger-check.txt'

env:
  DEPLOY_BRANCH: main
  BOT_DIR: /root/MT5-PropFirm-Bot
  SERVICE_NAME: futures-bot
  TRADOVATE_USER: ${{ secrets.TRADOVATE_USER }}
  TRADOVATE_PASS: ${{ secrets.TRADOVATE_PASS }}
  TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check all Python modules
        run: |
          for f in $(find futures_bot -name "*.py" 2>/dev/null); do
            python -m py_compile "$f" && echo "  OK: $f" || echo "  FAIL: $f"
          done

  merge-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to main
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            if git fetch origin ${{ env.DEPLOY_BRANCH }} 2>/dev/null; then
              git checkout ${{ env.DEPLOY_BRANCH }}
              git reset --hard origin/${{ env.DEPLOY_BRANCH }}
              if ! git merge ${{ github.sha }} --no-edit \
                -m "Auto-merge ${{ github.ref_name }} → ${{ env.DEPLOY_BRANCH }}" 2>/dev/null; then
                echo "Merge had conflicts, resolving..."
                for f in server_status.json system_status.json commands/output.txt; do
                  if git diff --name-only --diff-filter=U | grep -q "^${f}$"; then
                    echo "  Resolving $f: keeping main's version"
                    git checkout --ours "$f"
                    git add "$f"
                  fi
                done
                REMAINING=$(git diff --name-only --diff-filter=U 2>/dev/null)
                if [ -n "$REMAINING" ]; then
                  echo "  Remaining conflicts: $REMAINING"
                  git checkout --theirs $REMAINING
                  git add $REMAINING
                fi
                git commit --no-edit || { echo "Merge failed"; exit 1; }
              fi
            else
              echo "Branch ${{ env.DEPLOY_BRANCH }} does not exist — creating from ${{ github.sha }}"
              git checkout -b ${{ env.DEPLOY_BRANCH }} ${{ github.sha }}
            fi
            if git push origin ${{ env.DEPLOY_BRANCH }}; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (main moved), retrying in 5s..."
            sleep 5
          done
          echo "All 3 attempts failed"
          exit 1

      - name: Deploy to VPS via SSH
        id: ssh_deploy
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TRADOVATE_USER,TRADOVATE_PASS,TRADOVATE_ACCESS_TOKEN,TELEGRAM_TOKEN,TELEGRAM_CHAT_ID
          command_timeout: 5m
          script: |
            set -e
            echo "=== Auto-merge deploy: ${{ github.ref_name }} → ${{ env.DEPLOY_BRANCH }} ==="
            BOT_DIR="${{ env.BOT_DIR }}"
            cd "$BOT_DIR" || exit 1

            # Preserve token before git reset
            cp configs/.tradovate_token.json /tmp/.tradovate_token_backup.json 2>/dev/null || true

            git fetch origin ${{ env.DEPLOY_BRANCH }}
            git reset --hard origin/${{ env.DEPLOY_BRANCH }}
            echo "Now at: $(git log -1 --oneline)"

            # Restore token
            cp /tmp/.tradovate_token_backup.json configs/.tradovate_token.json 2>/dev/null || true

            # Update deps + Playwright
            pip3 install -r requirements.txt -q 2>&1 | tail -3
            if ! python3 -c "import playwright" 2>/dev/null; then
              pip3 install playwright -q && python3 -m playwright install chromium 2>&1 | tail -3
            fi

            # Write .env
            cat > .env << ENVEOF
TRADOVATE_USER=${TRADOVATE_USER}
TRADOVATE_PASS=${TRADOVATE_PASS}
TRADOVATE_ACCESS_TOKEN=${TRADOVATE_ACCESS_TOKEN}
TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
ENVEOF

            # Always (re)create start_bot.sh inline — no dependency on git having it
            mkdir -p ${{ env.BOT_DIR }}/scripts
            cat > ${{ env.BOT_DIR }}/scripts/start_bot.sh << 'WRAPEOF'
#!/bin/bash
export PYTHONPATH=/root/MT5-PropFirm-Bot
cd /root/MT5-PropFirm-Bot
exec /usr/bin/python3 -m futures_bot.bot
WRAPEOF
            chmod +x ${{ env.BOT_DIR }}/scripts/start_bot.sh

            # Service file — uses start_bot.sh wrapper so PYTHONPATH is always set
            cat > /etc/systemd/system/${{ env.SERVICE_NAME }}.service << 'SVCEOF'
[Unit]
Description=TradeDay Futures Trading Bot
After=network.target

[Service]
Type=simple
WorkingDirectory=/root/MT5-PropFirm-Bot
ExecStart=/bin/bash /root/MT5-PropFirm-Bot/scripts/start_bot.sh
Restart=on-failure
RestartSec=30
Environment=PYTHONUNBUFFERED=1
Environment=PYTHONPATH=/root/MT5-PropFirm-Bot
EnvironmentFile=/root/MT5-PropFirm-Bot/.env

[Install]
WantedBy=multi-user.target
SVCEOF

            # Enable on boot + restart
            systemctl daemon-reload
            systemctl enable ${{ env.SERVICE_NAME }}
            systemctl reset-failed ${{ env.SERVICE_NAME }} 2>/dev/null || true
            systemctl restart ${{ env.SERVICE_NAME }}
            sleep 15

            if systemctl is-active --quiet ${{ env.SERVICE_NAME }}; then
              echo "BOT: RUNNING (PID $(systemctl show ${{ env.SERVICE_NAME }} --property=MainPID --value))"
              echo "--- Recent logs ---"
              journalctl -u ${{ env.SERVICE_NAME }} --no-pager -n 20 | tail -20
            else
              echo "BOT: FAILED (checking logs)"
              journalctl -u ${{ env.SERVICE_NAME }} --no-pager -n 20
            fi

            # Setup status cron
            CRON_CMD="cd $BOT_DIR && bash server_cron.sh >> /var/log/futures-bot-cron.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "server_cron.sh"; then
              (crontab -l 2>/dev/null; echo "*/5 * * * * $CRON_CMD") | crontab -
              echo "Status cron installed."
            fi

      - name: Verify deploy
        if: always()
        run: |
          if [ "${{ steps.ssh_deploy.outcome }}" = "failure" ]; then
            echo "::error::SSH deploy FAILED"
          else
            echo "SSH deploy succeeded."
          fi

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Auto-merge & Deploy
            Source: ${{ github.ref_name }}
            Status: ${{ job.status }}
