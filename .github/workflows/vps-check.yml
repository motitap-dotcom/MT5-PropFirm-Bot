name: VPS Check
on:
  push:
    paths:
      - 'trigger-check.txt'
      - 'scripts/check_bot.sh'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Copy script to VPS and run diagnostics
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          # Copy check script to VPS
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no scripts/check_bot.sh ${VPS_USER}@${VPS_HOST}:/tmp/check_bot.sh

          # Run it
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${VPS_USER}@${VPS_HOST} "bash /tmp/check_bot.sh > /tmp/vps_report.txt 2>&1; cat /tmp/vps_report.txt"

          # Fetch output back
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST}:/tmp/vps_report.txt vps_report.txt 2>/dev/null || echo "Failed to fetch report" > vps_report.txt
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST}:/root/MT5-PropFirm-Bot/status/status.json status/status.json 2>/dev/null || true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}

      - name: Commit report back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add vps_report.txt status/status.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" || (git commit -m "VPS check report $(date -u +'%Y-%m-%d %H:%M UTC')" && git push) || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Check completed
            Status: ${{ job.status }}
