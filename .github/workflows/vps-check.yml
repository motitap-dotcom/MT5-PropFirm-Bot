name: VPS Check
on:
  push:
    paths:
      - 'trigger-check.txt'
      - 'scripts/check_bot.sh'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.SERVER_GH_PAT || github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Run diagnostics on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: GH_TOKEN
          command_timeout: 2m
          script: |
            cd /root/MT5-PropFirm-Bot
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            REPO=$(git remote get-url origin | sed -E 's|.*github\.com[:/]||; s|\.git$||')
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            bash scripts/check_bot.sh > vps_report.txt 2>&1
            cat vps_report.txt
            git add vps_report.txt status/status.json 2>/dev/null
            git commit -m "VPS check report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin HEAD:${{ github.ref_name }} 2>&1 || echo "Push failed"

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Check: ${{ job.status }}
