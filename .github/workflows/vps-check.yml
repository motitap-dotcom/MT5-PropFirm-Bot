name: VPS Bot Verification

on:
  push:
    paths:
      - '.github/workflows/vps-check.yml'
      - 'trigger-check.txt'
      - 'scripts/verify_bot_live.sh'
      - 'scripts/remote_check.sh'
      - 'scripts/verify_ea.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify bot is alive on VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          echo "=== Uploading verify script to VPS ==="
          chmod +x scripts/verify_bot_live.sh
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no \
            scripts/verify_bot_live.sh \
            ${VPS_USER}@${VPS_IP}:/tmp/verify_bot_live.sh

          echo "=== Running verification on VPS ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=10 \
            ${VPS_USER}@${VPS_IP} \
            "bash /tmp/verify_bot_live.sh" > vps_verify_report.txt 2>&1 || true

          echo "EXIT_CODE=$?" >> vps_verify_report.txt
          echo ""
          echo "=== VERIFICATION REPORT ==="
          cat vps_verify_report.txt

      - name: Extract status for notification
        id: status
        run: |
          if grep -q "BOT STATUS: ALIVE AND KICKING" vps_verify_report.txt; then
            echo "result=HEALTHY" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          elif grep -q "BOT STATUS: RUNNING WITH ISSUES" vps_verify_report.txt; then
            echo "result=WARNING" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
          else
            echo "result=CRITICAL" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

          PASS=$(grep "Passed:" vps_verify_report.txt | head -1 | grep -o '[0-9]*' | head -1)
          FAIL=$(grep "Failed:" vps_verify_report.txt | head -1 | grep -o '[0-9]*' | head -1)
          WARNS=$(grep "Warnings:" vps_verify_report.txt | head -1 | grep -o '[0-9]*' | head -1)
          echo "pass=${PASS:-0}" >> $GITHUB_OUTPUT
          echo "fail=${FAIL:-0}" >> $GITHUB_OUTPUT
          echo "warn=${WARNS:-0}" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ steps.status.outputs.result }}"
          PASS="${{ steps.status.outputs.pass }}"
          FAIL="${{ steps.status.outputs.fail }}"
          WARNS="${{ steps.status.outputs.warn }}"
          MSG="GitHub Actions Bot Verification%0A%0AStatus: ${STATUS}%0APassed: ${PASS} | Failed: ${FAIL} | Warnings: ${WARNS}%0A%0ASource: GitHub Actions (push trigger)%0ABranch: ${GITHUB_REF_NAME}%0ATime: $(date -u '+%Y-%m-%d %H:%M UTC')"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" > /dev/null 2>&1 || true

      - name: Commit verification report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_verify_report.txt
          git commit -m "Bot verification report $(date -u '+%Y-%m-%d %H:%M UTC') - ${{ steps.status.outputs.result }}" || true
          git push || true
