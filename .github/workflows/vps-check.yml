name: VPS Status Check

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/vps-check.yml'
      - 'trigger-check.txt'
      - 'scripts/check_status.sh'
      - 'scripts/check_trades.sh'

permissions:
  contents: write

jobs:
  check-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run VPS status check
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          chmod +x scripts/check_status.sh scripts/check_trades.sh
          sshpass -p 'Moti0417!' scp -o StrictHostKeyChecking=no scripts/check_trades.sh root@77.237.234.2:/tmp/check_trades.sh
          sshpass -p 'Moti0417!' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 root@77.237.234.2 "bash /tmp/check_trades.sh" > vps_report.txt 2>&1 || true
          echo "" >> vps_report.txt
          echo "WORKFLOW_EXIT_CODE=$?" >> vps_report.txt
          cat vps_report.txt

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_report.txt
          git commit -m "Account & trade report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin HEAD || true
