name: VPS Status Check

on:
  push:
    paths:
      - '.github/workflows/vps-check.yml'
      - 'trigger-check.txt'
      - 'scripts/remote_check.sh'
      - 'scripts/deep_check.sh'
      - 'scripts/connection_check.sh'
      - 'scripts/network_check.sh'
      - 'scripts/quick_check.sh'
      - 'scripts/verify_ea.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Run VPS diagnostics
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          chmod +x scripts/verify_ea.sh
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no scripts/verify_ea.sh ${VPS_USER}@${VPS_IP}:/tmp/check.sh
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${VPS_USER}@${VPS_IP} "bash /tmp/check.sh" > vps_report.txt 2>&1
          echo "EXIT_CODE=$?" >> vps_report.txt
          cat vps_report.txt

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ VPS Check Complete - report committed"
          else
            MSG="❌ VPS Check Failed - check GitHub Actions"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" > /dev/null 2>&1 || true

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_report.txt
          git commit -m "VPS status report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin ${{ github.ref_name }} || true
