name: VPS Status Check

on:
  push:
    paths:
      - '.github/workflows/vps-check.yml'
      - 'trigger-check.txt'
      - 'scripts/remote_check.sh'
      - 'scripts/deep_check.sh'
      - 'scripts/connection_check.sh'
      - 'scripts/network_check.sh'
      - 'scripts/quick_check.sh'
      - 'scripts/verify_ea.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH connection
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Determine connection method: SSH Key or Password
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "Using SSH Key authentication"
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
            chmod 600 ~/.ssh/vps_key
          elif [ -n "${{ secrets.VPS_PASSWORD }}" ]; then
            echo "Using password authentication"
            sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          else
            echo "ERROR: No SSH credentials found! Set VPS_SSH_KEY or VPS_PASSWORD in GitHub Secrets"
            exit 1
          fi

          # Determine host and user
          VPS_HOST="${{ secrets.VPS_HOST }}"
          [ -z "$VPS_HOST" ] && VPS_HOST="${{ secrets.VPS_IP }}"
          VPS_USER="${{ secrets.VPS_USER }}"
          [ -z "$VPS_USER" ] && VPS_USER="root"
          VPS_PORT="${{ secrets.VPS_PORT }}"
          [ -z "$VPS_PORT" ] && VPS_PORT="22"

          echo "VPS_HOST=${VPS_HOST}" >> $GITHUB_ENV
          echo "VPS_USER=${VPS_USER}" >> $GITHUB_ENV
          echo "VPS_PORT=${VPS_PORT}" >> $GITHUB_ENV

      - name: Run VPS diagnostics
        run: |
          if [ -f ~/.ssh/vps_key ]; then
            SSH="ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -p ${VPS_PORT}"
            SCP="scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no -P ${VPS_PORT}"
          else
            SSH="sshpass -p '${{ secrets.VPS_PASSWORD }}' ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -p ${VPS_PORT}"
            SCP="sshpass -p '${{ secrets.VPS_PASSWORD }}' scp -o StrictHostKeyChecking=no -P ${VPS_PORT}"
          fi

          chmod +x scripts/remote_check.sh scripts/deep_check.sh scripts/verify_ea.sh 2>/dev/null || true
          $SCP scripts/verify_ea.sh ${VPS_USER}@${VPS_HOST}:/tmp/check.sh
          $SSH ${VPS_USER}@${VPS_HOST} "bash /tmp/check.sh" > vps_report.txt 2>&1
          echo "EXIT_CODE=$?" >> vps_report.txt
          cat vps_report.txt

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_report.txt
          git commit -m "VPS status report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
