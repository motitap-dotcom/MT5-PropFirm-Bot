name: VPS Status Check

on:
  schedule:
    - cron: '0 */6 * * 1-5'  # Every 6 hours on weekdays
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do?'
        required: true
        default: 'status'
        type: choice
        options:
          - status
          - restart-mt5
          - view-trades
          - view-balance

permissions:
  contents: write

jobs:
  manage-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass > /dev/null 2>&1

      - name: Run action on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          ACTION: ${{ github.event.inputs.action || 'status' }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_PASSWORD" ]; then
            echo "ERROR: VPS_HOST or VPS_PASSWORD secret is missing!"
            exit 1
          fi

          SSH="sshpass -p ${VPS_PASSWORD} ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=5 -o ServerAliveCountMax=2 -p 22 root@${VPS_HOST}"
          SCP="sshpass -p ${VPS_PASSWORD} scp -o StrictHostKeyChecking=no -P 22"

          chmod +x scripts/vps_manage.sh
          $SCP scripts/vps_manage.sh root@${VPS_HOST}:/tmp/manage.sh
          $SSH "bash /tmp/manage.sh ${ACTION}" > vps_report.txt 2>&1 || true
          cat vps_report.txt

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping"
            exit 0
          fi

          ICON="✅"
          if grep -q "NOT RUNNING" vps_report.txt 2>/dev/null; then
            ICON="🔴"
          fi

          # Build clean message for Telegram
          REPORT=$(head -40 vps_report.txt 2>/dev/null | tr -d '\r' | sed 's/[""]/\\"/g' || echo "No report")
          ACTION="${{ github.event.inputs.action || 'status' }}"
          HEADER="${ICON} VPS ${ACTION^^} $(date -u '+%H:%M UTC')"

          # Use jq to properly escape for JSON
          JSON=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "${HEADER}
          ${REPORT}" \
            '{chat_id: $chat_id, text: $text}')

          RESULT=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON")
          echo "Telegram response: $RESULT"

      - name: Commit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_report.txt
          git commit -m "VPS report: ${{ github.event.inputs.action || 'status' }} $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
