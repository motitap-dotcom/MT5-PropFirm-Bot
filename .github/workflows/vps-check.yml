name: VPS Check
on:
  push:
    paths:
      - 'trigger-check.txt'
      - 'scripts/check_bot.sh'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            bash scripts/check_bot.sh > vps_report.txt 2>&1
            cat vps_report.txt
            git add vps_report.txt status/status.json 2>/dev/null
            git commit -m "VPS check report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin HEAD:${{ github.ref_name }} || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Check completed
            Status: ${{ job.status }}
