name: VPS Status Check

on:
  push:
    paths:
      - '.github/workflows/vps-check.yml'
      - 'trigger-check.txt'
      - 'scripts/verify_ea.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y -qq sshpass > /dev/null 2>&1

      - name: Check VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_PASSWORD" ]; then
            echo "ERROR: VPS_HOST or VPS_PASSWORD secret is missing!"
            echo "Go to: GitHub repo → Settings → Secrets → Actions"
            echo "Add: VPS_HOST and VPS_PASSWORD"
            exit 1
          fi

          echo "Connecting to ${VPS_HOST}..."
          SSH="sshpass -p ${VPS_PASSWORD} ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ServerAliveInterval=5 -o ServerAliveCountMax=2 -p 22 root@${VPS_HOST}"
          SCP="sshpass -p ${VPS_PASSWORD} scp -o StrictHostKeyChecking=no -P 22"

          chmod +x scripts/verify_ea.sh
          $SCP scripts/verify_ea.sh root@${VPS_HOST}:/tmp/check.sh
          $SSH "bash /tmp/check.sh" > vps_report.txt 2>&1 || true
          cat vps_report.txt

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping notification"
            exit 0
          fi
          STATUS="✅"
          if grep -q "NOT RUNNING" vps_report.txt 2>/dev/null; then
            STATUS="🔴"
          fi
          MSG="${STATUS} VPS Check $(date -u '+%H:%M UTC')
          $(head -30 vps_report.txt 2>/dev/null || echo 'No report')"
          # Telegram max message is 4096 chars
          MSG="${MSG:0:4000}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="" > /dev/null 2>&1 || true

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_report.txt
          git commit -m "VPS status report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
