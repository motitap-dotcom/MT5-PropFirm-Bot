name: Setup ENV and Verify Bot

on:
  push:
    paths:
      - '.github/workflows/setup-and-verify.yml'
      - 'scripts/setup_env.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup .env and verify bot on VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          echo "=== Step 1: Create .env on VPS ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ${VPS_USER}@${VPS_IP} bash -c "'
              cat > /root/.env << EOF
          # PropFirmBot Environment Configuration
          TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
          TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
          MT5_ACCOUNT=11797849
          MT5_SERVER=FundedNext-Server
          VPS_IP=${VPS_IP}
          EOF
              chmod 600 /root/.env
              echo \".env created successfully\"
              cat /root/.env | grep -v TOKEN | grep -v PASSWORD
          '" 2>&1 | tee env_setup.log

          echo ""
          echo "=== Step 2: Upload and run verification ==="
          chmod +x scripts/verify_bot_live.sh
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no \
            scripts/verify_bot_live.sh \
            ${VPS_USER}@${VPS_IP}:/tmp/verify_bot_live.sh

          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=10 \
            ${VPS_USER}@${VPS_IP} \
            "bash /tmp/verify_bot_live.sh" > vps_verify_report.txt 2>&1 || true

          echo ""
          echo "=== VERIFICATION REPORT ==="
          cat vps_verify_report.txt

          echo ""
          echo "=== Step 3: Enable mt5 systemd service ==="
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            ${VPS_USER}@${VPS_IP} bash -c "'
              if systemctl list-unit-files | grep -q mt5; then
                systemctl enable mt5 2>/dev/null || true
                echo \"mt5 service enabled\"
              else
                echo \"mt5 service not installed, skipping\"
              fi
          '" 2>&1 || true

      - name: Extract status
        id: status
        run: |
          if grep -q "BOT STATUS: ALIVE AND KICKING" vps_verify_report.txt; then
            echo "result=HEALTHY" >> $GITHUB_OUTPUT
          elif grep -q "BOT STATUS: RUNNING WITH ISSUES" vps_verify_report.txt; then
            echo "result=WARNING" >> $GITHUB_OUTPUT
          else
            echo "result=CRITICAL" >> $GITHUB_OUTPUT
          fi

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_verify_report.txt
          git commit -m "Bot verify report $(date -u '+%Y-%m-%d %H:%M UTC') - ${{ steps.status.outputs.result }}" || true
          git push || true
