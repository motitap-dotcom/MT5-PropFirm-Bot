name: VPS Fix and Restart MT5

on:
  push:
    paths:
      - '.github/workflows/vps-fix.yml'
      - 'scripts/fix_and_restart.sh'
      - 'scripts/clean_restart.sh'
      - 'scripts/upgrade_wine.sh'
      - 'scripts/fix_wine_version.sh'
      - 'scripts/force_wine11.sh'
      - 'scripts/install_mt5_linux.sh'
      - 'scripts/compile_ea.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run fix/compile script on VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1
          # Find the latest script to run
          if [ -f scripts/compile_ea.sh ]; then
            SCRIPT=scripts/compile_ea.sh
          elif [ -f scripts/fix_and_restart.sh ]; then
            SCRIPT=scripts/fix_and_restart.sh
          else
            SCRIPT=scripts/install_mt5_linux.sh
          fi
          echo "Running: $SCRIPT"
          chmod +x "$SCRIPT"
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no "$SCRIPT" ${VPS_USER}@${VPS_IP}:/tmp/fix.sh
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 ${VPS_USER}@${VPS_IP} "bash /tmp/fix.sh" > vps_fix_report.txt 2>&1 || true
          echo "EXIT_CODE=$?" >> vps_fix_report.txt
          cat vps_fix_report.txt

      - name: Commit fix report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vps_fix_report.txt
          git commit -m "VPS fix report $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
