name: VPS Fix
on:
  push:
    paths:
      - 'scripts/fix_and_restart.sh'
      - 'scripts/install_bot.sh'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fix and restart on VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            cd /root/MT5-PropFirm-Bot
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            bash scripts/fix_and_restart.sh > vps_fix_report.txt 2>&1
            cat vps_fix_report.txt

      - name: Fetch report from VPS
        continue-on-error: true
        run: |
          sudo apt-get install -y sshpass -qq
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST}:/root/MT5-PropFirm-Bot/vps_fix_report.txt vps_fix_report.txt 2>/dev/null || echo "Failed to fetch report from VPS" > vps_fix_report.txt
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}

      - name: Commit report back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add vps_fix_report.txt
          git commit -m "VPS fix report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
          git push || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Fix completed
            Status: ${{ job.status }}
