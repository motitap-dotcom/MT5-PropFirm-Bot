name: VPS Quick Deploy

on:
  push:
    paths:
      - '.github/workflows/vps-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-bot-server-connection-JbPec
          fetch-depth: 0

      - name: Force recompile EA on VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set +e
          REPORT="deploy_result.txt"
          echo "=== FORCE RECOMPILE $(date -u) ===" > $REPORT

          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          ssh_cmd() {
            local desc="$1"; local cmd="$2"
            for attempt in 1 2 3; do
              result=$(sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 ${VPS_USER}@${VPS_IP} "$cmd" 2>&1)
              local rc=$?
              if [ $rc -eq 0 ]; then
                echo "[$desc] OK" >> $REPORT
                echo "$result" >> $REPORT
                return 0
              fi
              echo "[$desc] attempt $attempt failed (rc=$rc): $result" >> $REPORT
              sleep $((attempt * 3))
            done
            echo "[$desc] GAVE UP" >> $REPORT
            return 1
          }

          # Step 1: Backup old .ex5 and delete it to force recompilation
          ssh_cmd "RECOMPILE" '
            MT5="/root/.wine/drive_c/Program Files/MetaTrader 5"
            EA_DIR="$MT5/MQL5/Experts/PropFirmBot"

            echo "=== CURRENT STATE ==="
            ls -la "$EA_DIR/PropFirmBot.ex5" 2>/dev/null
            ls -la "$EA_DIR/PropFirmBot.mq5" 2>/dev/null

            echo ""
            echo "=== BACKUP AND DELETE OLD .ex5 ==="
            cp "$EA_DIR/PropFirmBot.ex5" "$EA_DIR/PropFirmBot.ex5.bak" 2>/dev/null
            rm -f "$EA_DIR/PropFirmBot.ex5"
            echo "Deleted old .ex5"

            echo ""
            echo "=== STOP MT5 ==="
            pkill -f terminal64.exe 2>/dev/null
            sleep 5
            pgrep -la terminal64 && echo "STILL RUNNING!" || echo "MT5 stopped"

            echo ""
            echo "=== START MT5 (should trigger compile) ==="
            export DISPLAY=:99
            export WINEPREFIX=/root/.wine
            nohup wine "$MT5/terminal64.exe" \
              /login:11797849 /password:gazDE62## /server:FundedNext-Server \
              > /tmp/mt5_start.log 2>&1 &
            MT5_PID=$!
            echo "MT5 PID: $MT5_PID"

            echo ""
            echo "=== WAITING 30s for compile + init ==="
            sleep 30

            echo ""
            echo "=== CHECK COMPILATION ==="
            if [ -f "$EA_DIR/PropFirmBot.ex5" ]; then
              echo "SUCCESS: .ex5 exists!"
              ls -la "$EA_DIR/PropFirmBot.ex5"
              ls -la "$EA_DIR/PropFirmBot.ex5.bak" 2>/dev/null
              OLD_SIZE=$(stat -c%s "$EA_DIR/PropFirmBot.ex5.bak" 2>/dev/null || echo 0)
              NEW_SIZE=$(stat -c%s "$EA_DIR/PropFirmBot.ex5" 2>/dev/null || echo 0)
              echo "Old size: $OLD_SIZE bytes"
              echo "New size: $NEW_SIZE bytes"
              if [ "$NEW_SIZE" != "$OLD_SIZE" ]; then
                echo "SIZE CHANGED - new compilation!"
              else
                echo "Same size - might be copy from backup"
              fi
            else
              echo "FAILED: No .ex5 created!"
              echo "Restoring backup..."
              cp "$EA_DIR/PropFirmBot.ex5.bak" "$EA_DIR/PropFirmBot.ex5" 2>/dev/null
              echo "Backup restored, restarting MT5..."
              pkill -f terminal64.exe 2>/dev/null
              sleep 3
              nohup wine "$MT5/terminal64.exe" \
                /login:11797849 /password:gazDE62## /server:FundedNext-Server \
                > /tmp/mt5_start.log 2>&1 &
              sleep 15
            fi

            echo ""
            echo "=== MT5 PROCESS ==="
            ps aux | grep terminal64 | grep -v grep || echo "MT5 NOT RUNNING!"

            echo ""
            echo "=== TERMINAL LOG ==="
            TLOG=$(ls -t "$MT5/logs/"*.log 2>/dev/null | head -1)
            [ -n "$TLOG" ] && tail -c 3000 "$TLOG" | tr -d "\0" | tail -15

            echo ""
            echo "=== EA LOG (last 20) ==="
            TODAY=$(date -u "+%Y%m%d")
            EALOG="$MT5/MQL5/Logs/${TODAY}.log"
            [ -f "$EALOG" ] && tail -c 5000 "$EALOG" | tr -d "\0" | tail -20 || echo "No EA log"

            echo ""
            echo "=== COMPILE LOG (if any) ==="
            ls -la "$EA_DIR/"*.log 2>/dev/null || echo "No compile logs"
            [ -f "$EA_DIR/PropFirmBot.log" ] && cat "$EA_DIR/PropFirmBot.log" | tr -d "\0" | tail -10

            # Cleanup backup
            rm -f "$EA_DIR/PropFirmBot.ex5.bak" 2>/dev/null
          '

          echo "=== DONE $(date -u) ===" >> $REPORT
          cat $REPORT

      - name: Commit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin claude/fix-bot-server-connection-JbPec
          git reset --soft origin/claude/fix-bot-server-connection-JbPec
          git add -f deploy_result.txt 2>/dev/null || true
          git commit -m "Recompile result $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin HEAD:claude/fix-bot-server-connection-JbPec || true
