name: VPS Fix
on:
  push:
    paths:
      - 'scripts/fix_and_restart.sh'
      - 'scripts/install_bot.sh'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            cd /root/MT5-PropFirm-Bot
            git pull origin ${{ github.ref_name }}
            bash scripts/fix_and_restart.sh > vps_fix_report.txt 2>&1
            git add vps_fix_report.txt
            git commit -m "VPS fix report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin ${{ github.ref_name }} || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@v0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Fix completed
            Status: ${{ job.status }}
