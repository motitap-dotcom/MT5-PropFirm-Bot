name: VPS Fix
on:
  push:
    paths:
      - 'scripts/fix_and_restart.sh'
      - 'scripts/install_bot.sh'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fix and restart on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 5m
          script: |
            cd /root/MT5-PropFirm-Bot
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            bash scripts/fix_and_restart.sh > vps_fix_report.txt 2>&1
            cat vps_fix_report.txt
            git add vps_fix_report.txt
            git commit -m "VPS fix report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin HEAD:${{ github.ref_name }} || true

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Fix: ${{ job.status }}
