name: VPS Quick Deploy

on:
  push:
    paths:
      - '.github/workflows/vps-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-bot-server-connection-JbPec
          fetch-depth: 0

      - name: Deploy watchdog to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set +e
          REPORT="deploy_result.txt"
          echo "=== WATCHDOG DEPLOY $(date -u) ===" > $REPORT

          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null 2>&1

          run_ssh() {
            local desc="$1"; local cmd="$2"
            echo "[$desc]" >> $REPORT
            result=$(sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=10 ${VPS_USER}@${VPS_IP} "$cmd" 2>&1)
            echo "$result" >> $REPORT
            echo "rc=$?" >> $REPORT
            echo "" >> $REPORT
          }

          # Step 1: Upload watchdog script
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no scripts/watchdog.sh ${VPS_USER}@${VPS_IP}:/root/MT5-PropFirm-Bot/scripts/watchdog.sh 2>> $REPORT
          echo "SCP watchdog: $?" >> $REPORT

          # Step 2: Set up cron and make executable
          run_ssh "SETUP_CRON" '
            chmod +x /root/MT5-PropFirm-Bot/scripts/watchdog.sh
            # Remove old watchdog cron if exists
            crontab -l 2>/dev/null | grep -v watchdog > /tmp/crontab_clean.txt
            # Add new cron: every 15 minutes
            echo "*/15 * * * * /root/MT5-PropFirm-Bot/scripts/watchdog.sh >> /var/log/propfirmbot_watchdog.log 2>&1" >> /tmp/crontab_clean.txt
            crontab /tmp/crontab_clean.txt
            rm -f /tmp/crontab_clean.txt
            echo "Current crontab:"
            crontab -l
          '

          # Step 3: Run watchdog once to test
          run_ssh "TEST_WATCHDOG" 'bash /root/MT5-PropFirm-Bot/scripts/watchdog.sh 2>&1'

          # Step 4: Quick status check
          run_ssh "STATUS" '
            MT5="/root/.wine/drive_c/Program Files/MetaTrader 5"
            echo "=== MT5 ==="
            ps aux | grep terminal64 | grep -v grep | head -1 || echo "NOT RUNNING"
            echo ""
            echo "=== ACCOUNT ==="
            TODAY=$(date -u "+%Y%m%d")
            EALOG="$MT5/MQL5/Logs/${TODAY}.log"
            [ -f "$EALOG" ] && tr -d "\0" < "$EALOG" | grep "\[HEARTBEAT\]" | tail -1 || echo "No heartbeat"
            echo ""
            echo "=== LAST 5 SIGNALS ==="
            [ -f "$EALOG" ] && tr -d "\0" < "$EALOG" | grep -E "\[SMC\].*signal|\[EMA\].*signal|\[TRADE\]" | tail -5 || echo "No signals"
          '

          echo "=== DONE $(date -u) ===" >> $REPORT
          cat $REPORT

      - name: Commit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin claude/fix-bot-server-connection-JbPec
          git reset --soft origin/claude/fix-bot-server-connection-JbPec
          git add -f deploy_result.txt 2>/dev/null || true
          git commit -m "Watchdog deploy $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin HEAD:claude/fix-bot-server-connection-JbPec || true
