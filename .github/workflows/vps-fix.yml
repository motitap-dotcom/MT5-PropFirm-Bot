name: VPS Quick Deploy

on:
  push:
    paths:
      - '.github/workflows/vps-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/fix-bot-server-connection-JbPec
          fetch-depth: 0

      - name: Deploy to VPS
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set +e
          REPORT="deploy_result.txt"
          echo "=== VPS DEPLOY $(date -u) ===" > $REPORT

          # Check secrets
          if [ -z "$VPS_IP" ] || [ -z "$VPS_PASSWORD" ] || [ -z "$VPS_USER" ]; then
            echo "ERROR: Missing VPS secrets! IP='$VPS_IP' USER='$VPS_USER' PASS_LEN=${#VPS_PASSWORD}" >> $REPORT
            cat $REPORT
            exit 1
          fi
          echo "Secrets OK: IP=$VPS_IP USER=$VPS_USER PASS_LEN=${#VPS_PASSWORD}" >> $REPORT

          # Install sshpass with retry
          for i in 1 2 3; do
            sudo apt-get update -qq 2>/dev/null && sudo apt-get install -y -qq sshpass 2>/dev/null && break
            echo "apt retry $i..." >> $REPORT
            sleep 2
          done
          which sshpass >> $REPORT 2>&1 || { echo "FATAL: sshpass not installed" >> $REPORT; cat $REPORT; exit 1; }

          # SSH function with retry
          ssh_cmd() {
            local desc="$1"
            local cmd="$2"
            local result=""
            for attempt in 1 2 3; do
              echo "[$desc] attempt $attempt..." >> $REPORT
              result=$(sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 ${VPS_USER}@${VPS_IP} "$cmd" 2>&1)
              local rc=$?
              if [ $rc -eq 0 ]; then
                echo "[$desc] OK" >> $REPORT
                echo "$result" >> $REPORT
                return 0
              fi
              echo "[$desc] failed (rc=$rc): $result" >> $REPORT
              sleep $((attempt * 3))
            done
            echo "[$desc] GAVE UP after 3 attempts" >> $REPORT
            return 1
          }

          # SCP function with retry
          scp_cmd() {
            local src="$1"
            local dst="$2"
            for attempt in 1 2 3; do
              sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$src" "${VPS_USER}@${VPS_IP}:$dst" 2>> $REPORT
              if [ $? -eq 0 ]; then
                echo "SCP OK: $src -> $dst" >> $REPORT
                return 0
              fi
              echo "SCP retry $attempt for $src" >> $REPORT
              sleep $((attempt * 3))
            done
            echo "SCP FAILED: $src" >> $REPORT
            return 1
          }

          # Step 1: Test connectivity
          ssh_cmd "PING" "echo 'VPS reachable at $(date)'; uname -a"

          # Step 2: Pull latest code on VPS
          ssh_cmd "GIT_PULL" "cd /root/MT5-PropFirm-Bot && git fetch origin claude/fix-bot-server-connection-JbPec 2>&1 && git checkout claude/fix-bot-server-connection-JbPec 2>&1 && git reset --hard origin/claude/fix-bot-server-connection-JbPec 2>&1 && echo 'HEAD: $(git log --oneline -1)'"

          # Step 3: Copy EA files on VPS
          ssh_cmd "COPY_EA" 'cp /root/MT5-PropFirm-Bot/EA/*.mq5 /root/MT5-PropFirm-Bot/EA/*.mqh "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot/" 2>&1 && ls -la "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts/PropFirmBot/"*.mq5 | head -3 && echo "COPY OK"'

          # Step 4: Stop MT5
          ssh_cmd "STOP_MT5" 'pkill -f terminal64.exe 2>/dev/null; sleep 3; pgrep -la terminal64 && echo "STILL RUNNING" || echo "MT5 STOPPED"'

          # Step 5: Start MT5
          ssh_cmd "START_MT5" 'export DISPLAY=:99; export WINEPREFIX=/root/.wine; nohup wine "/root/.wine/drive_c/Program Files/MetaTrader 5/terminal64.exe" /login:11797849 /password:gazDE62## /server:FundedNext-Server > /dev/null 2>&1 & sleep 2; echo "MT5 START CMD SENT"'

          # Step 6: Wait and check
          echo "Waiting 25 seconds for MT5 to start..." >> $REPORT
          sleep 25
          ssh_cmd "CHECK" 'pgrep -la terminal64 || echo "MT5 NOT RUNNING"; echo "---CONNECTIONS---"; ss -tn state established | grep -v ":22 \|:5900 " | head -5; echo "---LOGS---"; EALOG=$(ls -t "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Logs/"*.log 2>/dev/null | head -1); [ -n "$EALOG" ] && tail -c 4000 "$EALOG" | tr -d "\0" | tail -30; echo "---TERMINAL---"; TLOG=$(ls -t "/root/.wine/drive_c/Program Files/MetaTrader 5/logs/"*.log 2>/dev/null | head -1); [ -n "$TLOG" ] && tail -c 2000 "$TLOG" | tr -d "\0" | tail -10'

          echo "=== DONE $(date -u) ===" >> $REPORT
          cat $REPORT

      - name: Commit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin claude/fix-bot-server-connection-JbPec
          git reset --soft origin/claude/fix-bot-server-connection-JbPec
          git add -f deploy_result.txt 2>/dev/null || true
          git commit -m "Deploy result $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin HEAD:claude/fix-bot-server-connection-JbPec || true
