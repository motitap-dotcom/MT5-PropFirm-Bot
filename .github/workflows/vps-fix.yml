name: VPS Fix
on:
  push:
    paths:
      - 'scripts/fix_and_restart.sh'
      - 'scripts/install_bot.sh'

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.SERVER_GH_PAT || github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Fix and restart on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: GH_TOKEN
          command_timeout: 5m
          script: |
            cd /root/MT5-PropFirm-Bot
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            REPO=$(git remote get-url origin | sed -E 's|.*github\.com[:/]||; s|\.git$||')
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
            cp configs/.tradovate_token.json /tmp/.tradovate_token_backup.json 2>/dev/null || true
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            cp /tmp/.tradovate_token_backup.json configs/.tradovate_token.json 2>/dev/null || true
            bash scripts/fix_and_restart.sh > vps_fix_report.txt 2>&1
            cat vps_fix_report.txt
            git add vps_fix_report.txt
            git commit -m "VPS fix report $(date -u +'%Y-%m-%d %H:%M UTC')" || true
            git push origin HEAD:${{ github.ref_name }} 2>&1 || echo "Push failed"

      - name: Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            VPS Fix: ${{ job.status }}
